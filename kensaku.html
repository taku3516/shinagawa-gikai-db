<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1f4e79" />
  <title>横断検索 | 品川区議会DB</title>
  <style>
    :root {
      --c-main: #1f4e79;
      --c-main-dark: #173a5e;
      --c-main-pale: #e7eef4;
      --c-bg: #f4f1e8;
      --c-card: #fffdf8;
      --c-ink: #17212b;
      --c-ink-soft: #4f5d68;
      --c-border: #b9c3cc;
      --c-rule: #d8d2c4;
      --c-focus: #f59e0b;
      --c-result-bg: #fef3c7;
      --c-result-text: #92400e;
      --c-news-bg: #f0fdf4;
      --c-news-text: #166534;
      --c-election-bg: #f5f3ff;
      --c-election-text: #6d28d9;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    body {
      margin: 0;
      background: var(--c-bg);
      color: var(--c-ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      overflow-wrap: break-word;
    }
    a { color: var(--c-main-dark); font-weight: 700; text-decoration: none; }
    a:hover { text-decoration: underline; }
    button, input, select { font: inherit; }
    button, select { cursor: pointer; }
    button:focus-visible, input:focus-visible, select:focus-visible, summary:focus-visible, a:focus-visible {
      outline: 3px solid var(--c-focus);
      outline-offset: 2px;
    }
    .container { width: min(1160px, calc(100% - 32px)); margin: 0 auto; }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .hero {
      padding: 36px 0 22px;
      border-top: 6px solid var(--c-main);
      border-bottom: 1px solid var(--c-rule);
      background: var(--c-card);
    }
    .breadcrumb { margin: 0 0 12px; font-size: 14px; }
    h1 { margin: 0 0 12px; font-size: clamp(28px, 5vw, 44px); line-height: 1.1; }
    .lead { max-width: 820px; margin: 0; font-size: 15px; line-height: 1.9; }
    .notice {
      max-width: 860px;
      margin-top: 15px;
      padding: 11px 15px;
      border: 1px solid rgba(80, 129, 181, .5);
      border-left: 4px solid var(--c-main);
      border-radius: 4px;
      background: var(--c-card);
      font-size: 13px;
      line-height: 1.7;
    }
    .search-panel-wrap {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid var(--c-border);
      background: rgba(244, 241, 232, .97);
      box-shadow: 0 2px 8px rgba(23, 33, 43, .08);
      backdrop-filter: blur(8px);
    }
    .search-panel { padding: 14px 0 12px; }
    .query-row { display: flex; gap: 8px; align-items: stretch; }
    .query-box { position: relative; flex: 1 1 auto; }
    #q {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--c-border);
      border-radius: 4px;
      background: var(--c-card);
      padding: 11px 48px 11px 14px;
      color: var(--c-ink);
      font-size: 16px;
    }
    .clear-query {
      position: absolute;
      top: 5px;
      right: 5px;
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 3px;
      background: transparent;
      color: var(--c-ink-soft);
      font-size: 22px;
    }
    .clear-query[hidden] { display: none; }
    #sort-order {
      min-height: 48px;
      border: 1px solid var(--c-border);
      border-radius: 4px;
      background: var(--c-card);
      padding: 9px 34px 9px 12px;
      color: var(--c-ink);
      font-size: 14px;
      font-weight: 800;
    }
    .category-tabs {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      overflow-x: auto;
      padding: 1px 1px 3px;
      scrollbar-width: thin;
    }
    .category-button {
      display: inline-flex;
      flex: 0 0 auto;
      align-items: center;
      min-height: 40px;
      border: 1px solid var(--c-border);
      border-radius: 4px;
      background: var(--c-card);
      padding: 7px 12px;
      color: var(--c-ink-soft);
      font-size: 13px;
      font-weight: 800;
    }
    .category-button[aria-pressed="true"] {
      border-color: var(--c-main);
      background: var(--c-main);
      color: #fff;
    }
    .category-count { margin-left: 6px; font-size: 11px; font-variant-numeric: tabular-nums; opacity: .84; }
    .filter-panel { margin-top: 7px; }
    .filter-panel summary {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      color: var(--c-main-dark);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }
    .filter-panel summary::after { content: "▾"; margin-left: 7px; }
    .filter-panel[open] summary::after { content: "▴"; }
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(140px, 1fr));
      gap: 10px;
      margin-top: 8px;
      padding: 12px;
      border: 1px solid var(--c-border);
      border-radius: 4px;
      background: var(--c-card);
    }
    .filter-field { display: grid; gap: 4px; }
    .filter-field label { color: var(--c-ink-soft); font-size: 12px; font-weight: 800; }
    .filter-field select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--c-border);
      border-radius: 3px;
      background: #fff;
      padding: 8px 10px;
      color: var(--c-ink);
      font-size: 14px;
    }
    .filter-actions { display: flex; align-items: end; }
    .reset-button {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--c-border);
      border-radius: 3px;
      background: var(--c-main-pale);
      color: var(--c-main-dark);
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 800;
    }
    .content-section { padding: 22px 0 52px; }
    .status-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }
    #hit { color: var(--c-ink-soft); font-size: 13px; font-weight: 800; }
    .rows { display: grid; gap: 11px; }
    .hitrow {
      border: 1px solid var(--c-border);
      border-left: 4px solid var(--c-main);
      border-radius: 4px;
      background: var(--c-card);
      padding: 15px 17px;
    }
    .hitrow[data-category="ニュース"] { border-left-color: #2f855a; }
    .hitrow[data-category="選挙"] { border-left-color: #7c3aed; }
    .hitrow h2 { margin: 1px 0 7px; font-size: 17px; line-height: 1.55; }
    .meta { margin: 0 0 7px; color: var(--c-main-dark); font-size: 12px; font-weight: 800; line-height: 1.6; }
    .summary { margin: 0; color: var(--c-ink-soft); font-size: 13px; line-height: 1.75; }
    .qa-summary {
      display: grid;
      grid-template-columns: 84px 1fr;
      gap: 5px 10px;
      margin: 9px 0 0;
      font-size: 13px;
      line-height: 1.75;
    }
    .qa-summary dt { color: var(--c-main-dark); font-weight: 800; }
    .qa-summary dd { margin: 0; color: var(--c-ink-soft); }
    .badges { margin-bottom: 5px; }
    .badge {
      display: inline-flex;
      margin: 0 6px 5px 0;
      border-radius: 3px;
      background: var(--c-main-pale);
      padding: 3px 9px;
      color: var(--c-main-dark);
      font-size: 11px;
      font-weight: 800;
    }
    .badge--year { background: #f3f4f6; color: #374151; }
    .badge--result { background: var(--c-result-bg); color: var(--c-result-text); }
    .badge--news { background: var(--c-news-bg); color: var(--c-news-text); }
    .badge--election { background: var(--c-election-bg); color: var(--c-election-text); }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      margin: 10px 6px 0 0;
      border: 1px solid rgba(80, 129, 181, .4);
      border-radius: 3px;
      background: var(--c-card);
      padding: 6px 11px;
      color: var(--c-main-dark);
      font-size: 12px;
      font-weight: 800;
    }
    .pill--source { border-color: #bbf7d0; background: #f0fdf4; color: #166534; }
    .pill--minutes { border-color: #bbf7d0; background: #f0fdf4; color: #15803d; }
    .pill--video { border-color: #fecaca; background: #fff1f2; color: #be123c; }
    mark { border-radius: 2px; background: #fde68a; color: inherit; padding: 0 .08em; }
    .guide {
      border: 1px dashed var(--c-border);
      border-radius: 4px;
      background: rgba(255, 253, 248, .68);
      padding: 28px 20px;
      color: var(--c-ink-soft);
      text-align: center;
    }
    .guide h2 { margin: 0 0 8px; color: var(--c-ink); font-size: 18px; }
    .guide p { margin: 0; font-size: 14px; line-height: 1.8; }
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }
    .page-button {
      min-width: 92px;
      min-height: 42px;
      border: 1px solid var(--c-border);
      border-radius: 4px;
      background: var(--c-card);
      color: var(--c-main-dark);
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 800;
    }
    .page-button:disabled { cursor: default; opacity: .45; }
    .page-position { color: var(--c-ink-soft); font-size: 13px; font-weight: 800; font-variant-numeric: tabular-nums; }
    footer {
      border-top: 1px solid var(--c-border);
      background: var(--c-main-dark);
      padding: 28px 0;
      color: #fff;
      text-align: center;
      font-size: 13px;
    }
    @media (max-width: 820px) {
      .filter-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .filter-actions { grid-column: span 2; }
    }
    @media (max-width: 600px) {
      .container { width: min(100% - 22px, 1160px); }
      .hero { padding-top: 28px; }
      .search-panel-wrap { position: relative; }
      .query-row { display: grid; grid-template-columns: 1fr; }
      #sort-order { width: 100%; }
      .filter-grid { grid-template-columns: 1fr; }
      .filter-actions { grid-column: auto; }
      .qa-summary { grid-template-columns: 1fr; gap: 2px; }
      .qa-summary dd + dt { margin-top: 6px; }
      .hitrow { padding: 14px 13px; }
      .pagination { gap: 6px; }
      .page-button { min-width: 78px; }
    }
  </style>
</head>
<body>
  <main>
    <header class="hero">
      <div class="container">
        <p class="breadcrumb"><a href="index.html">← 品川区議会DB トップへ</a></p>
        <h1>横断検索</h1>
        <p class="lead">
          令和元年〜令和8年の議会情報に加え、人物・選挙・品川区ニュースをまとめて検索できます。複数の言葉はスペースで区切ると、すべてを含む結果に絞り込めます。
        </p>
        <div class="notice">
          本サイトに収録している質問・答弁は要約です。発言全文を検索する場合は、公式の
          <a href="https://kaigiroku.city.shinagawa.tokyo.jp/index.php/100000?Template=search-phrase" target="_blank" rel="noopener">会議録検索システム「ことばで探す」</a>
          をご利用ください。
        </div>
      </div>
    </header>

    <div class="search-panel-wrap">
      <div class="container search-panel">
        <div class="query-row">
          <div class="query-box">
            <label class="sr-only" for="q">横断検索の検索語</label>
            <input id="q" type="search" placeholder="人物名・テーマ・制度名・地域名で検索" autocomplete="off" />
            <button id="clear-query" class="clear-query" type="button" aria-label="検索語を消去" hidden>×</button>
          </div>
          <label class="sr-only" for="sort-order">並び順</label>
          <select id="sort-order">
            <option value="relevance">関連度順</option>
            <option value="newest">新しい順</option>
            <option value="oldest">古い順</option>
          </select>
        </div>

        <div id="category-tabs" class="category-tabs" role="group" aria-label="検索する大分類"></div>

        <details id="filter-panel" class="filter-panel">
          <summary>詳しく絞り込む</summary>
          <div class="filter-grid">
            <div class="filter-field">
              <label for="type-filter">種類</label>
              <select id="type-filter"><option value="">すべての種類</option></select>
            </div>
            <div class="filter-field">
              <label for="year-filter">年</label>
              <select id="year-filter"><option value="">すべての年</option></select>
            </div>
            <div class="filter-field">
              <label for="result-filter">議決・選挙結果</label>
              <select id="result-filter"><option value="">すべての結果</option></select>
            </div>
            <div class="filter-field">
              <label for="source-filter">ニュース配信元</label>
              <select id="source-filter"><option value="">すべての配信元</option></select>
            </div>
            <div class="filter-field">
              <label for="tag-filter">タグ・分野</label>
              <select id="tag-filter"><option value="">すべてのタグ</option></select>
            </div>
            <div class="filter-actions">
              <button id="reset-search" class="reset-button" type="button">検索条件をリセット</button>
            </div>
          </div>
        </details>
      </div>
    </div>

    <section class="content-section">
      <div class="container">
        <div class="status-row">
          <span id="hit" aria-live="polite"></span>
        </div>
        <div id="results" class="rows"></div>
        <div id="guide" class="guide"></div>
        <nav id="pagination" class="pagination" aria-label="検索結果のページ" hidden></nav>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">品川区議会DB — これは品川区が運営しているものではありません。正確な情報は各公式サイトを確認してください。</div>
  </footer>

  <!-- 静的なデータファイルを読み込むため、GitHub Pagesとローカル表示の両方で動作する -->

  <script src="data/r08-committees-part-02.js"></script>
  <script src="data/r08-committees-part-03.js"></script>
  <script src="data/r08-committees-part-04.js"></script>

  <script src="data/r08-committees-part-06.js"></script>
  <script src="data/news-items.js"></script>

  <script>
    "use strict";

    const CATEGORY_DEFS = [
      { id: "all", label: "すべて" },
      { id: "council", label: "議会" },
      { id: "people", label: "人物" },
      { id: "elections", label: "選挙" },
      { id: "news", label: "ニュース" }
    ];
    const CATEGORY_LABELS = Object.fromEntries(CATEGORY_DEFS.map((item) => [item.id, item.label]));
    const PAGE_SIZE = 30;
    const db = window.SHINAGAWA_DB || { years: {} };
    const INDEX = [];

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]
      ));
    }

    function normalizeText(value) {
      return String(value ?? "")
        .normalize("NFKC")
        .toLocaleLowerCase("ja")
        .replace(/[ァ-ヶ]/g, (char) => String.fromCharCode(char.charCodeAt(0) - 0x60))
        .replace(/[\s・･_\-‐‑–—―,，.。/／()（）「」『』【】\[\]]+/g, "");
    }

    function eraLabel(year) {
      const numericYear = Number(year);
      if (!numericYear) return "";
      if (numericYear >= 2019) {
        const reiwa = numericYear - 2018;
        return `令和${reiwa === 1 ? "元" : reiwa}年（${numericYear}年）`;
      }
      if (numericYear === 2018) return "平成30年（2018年）";
      return `${numericYear}年`;
    }

    function yearFromId(yearId) {
      if (/^h30$/i.test(String(yearId))) return 2018;
      const match = String(yearId).match(/r(\d{2})/i);
      return match ? 2018 + Number(match[1]) : null;
    }

    function dateYear(value) {
      const match = String(value || "").match(/^(\d{4})/);
      return match ? Number(match[1]) : null;
    }

    function safeUrl(value) {
      const url = String(value || "").trim();
      if (/^https?:\/\//i.test(url) || /^#/.test(url) || /^[a-z0-9._/-]+\.html(?:[?#].*)?$/i.test(url)) return url;
      return "";
    }

    function linkList(links) {
      return (links || []).filter((link) => link && safeUrl(link.url));
    }

    function cleanResult(value) {
      const result = String(value || "").trim();
      const accepted = /^(原案可決|原案否決|可決|否決|承認|不承認|同意|不同意|採択|不採択|趣旨採択|継続審査|取り下げ承認|取り下げ|審議中|成立|賛成|反対|当選|落選|無投票当選)$/;
      return accepted.test(result) ? result : "";
    }

    function addItem(item) {
      const tags = [...new Set((item.tags || [])
        .filter(Boolean)
        .map((tag) => String(tag).trim())
        .filter((tag) => tag && tag.length <= 32))];
      const fields = {
        title: normalizeText(item.title),
        primary: normalizeText((item.primary || []).join(" ")),
        tags: normalizeText(tags.join(" ")),
        body: normalizeText([item.meta, item.body, item.question, item.answer].join(" "))
      };
      fields.all = [fields.title, fields.primary, fields.tags, fields.body].join(" ");
      INDEX.push({
        id: item.id || `result-${INDEX.length + 1}`,
        category: item.category,
        type: item.type,
        year: item.year || null,
        date: item.date || "",
        sortDate: item.sortDate || (item.date ? Date.parse(item.date) || 0 : (item.year || 0) * 10000000000),
        title: item.title || "名称未設定",
        meta: item.meta || "",
        body: item.body || "",
        question: item.question || "",
        answer: item.answer || "",
        result: cleanResult(item.result),
        source: item.source || "",
        tags,
        links: linkList(item.links),
        relevanceScore: Number(item.relevanceScore || 0),
        fields
      });
    }

    const aliasById = new Map(
      ((db.peopleData && db.peopleData.people) || []).map((person) => [person.id, person.aliases || []])
    );

    const yearIds = Object.keys(db.years || {}).sort().reverse();
    for (const yearId of yearIds) {
      const yearData = db.years[yearId];
      const year = yearFromId(yearId);
      const meetingNames = {};
      for (const meeting of yearData.meetings || []) {
        meetingNames[meeting.id] = meeting.name;
        addItem({
          id: `meeting-${meeting.id}`,
          category: "council",
          type: "会議",
          year,
          title: meeting.name,
          meta: [yearData.label, meeting.monthLabel, meeting.type].filter(Boolean).join("／"),
          body: meeting.summary || "",
          primary: [meeting.name, meeting.type],
          tags: [meeting.type],
          links: [{ type: "internal", label: "DB内で会議を開く", url: `index.html#meeting-${meeting.id}` }].concat(meeting.links || [])
        });
      }

      for (const bill of yearData.bills || []) {
        addItem({
          id: `bill-${yearId}-${bill.meetingId}-${bill.number || INDEX.length}`,
          category: "council",
          type: "議案",
          year,
          title: bill.title,
          meta: [yearData.label, meetingNames[bill.meetingId], bill.proposer].filter(Boolean).join("／"),
          body: bill.summary || "",
          result: bill.result || "",
          primary: [bill.number, bill.proposer, meetingNames[bill.meetingId]],
          tags: bill.tags || [],
          links: [{ type: "internal", label: "DB内で議案を開く", url: `index.html#bills-${bill.meetingId}` }].concat(bill.links || [])
        });
      }

      for (const petition of yearData.petitions || []) {
        addItem({
          id: `petition-${yearId}-${petition.meetingId}-${petition.number || INDEX.length}`,
          category: "council",
          type: "請願・陳情",
          year,
          title: [petition.number, petition.title].filter(Boolean).join(" "),
          meta: [yearData.label, meetingNames[petition.meetingId]].filter(Boolean).join("／"),
          body: petition.summary || "",
          result: petition.result || "",
          primary: [petition.number, meetingNames[petition.meetingId]],
          tags: petition.tags || [],
          links: [{ type: "internal", label: "DB内で請願・陳情を開く", url: `index.html#petitions-${petition.meetingId}` }].concat(petition.links || [])
        });
      }

      for (const questioner of yearData.questions || []) {
        const summaries = questioner.qaSummaries || [];
        const memberAliases = aliasById.get(questioner.memberId) || [];
        (questioner.topics || []).forEach((topic, topicIndex) => {
          const normalizedTopic = normalizeText(topic);
          const summary = summaries.find((item) => normalizeText(item.title) === normalizedTopic) || summaries[topicIndex] || {};
          addItem({
            id: `question-${yearId}-${questioner.meetingId}-${questioner.memberId || topicIndex}-${topicIndex}`,
            category: "council",
            type: "質問・答弁",
            year,
            title: topic,
            meta: [questioner.member, questioner.party, yearData.label, meetingNames[questioner.meetingId], questioner.kind || "一般質問"].filter(Boolean).join("／"),
            question: summary.question || "",
            answer: summary.answer || "",
            primary: [questioner.member, questioner.party, questioner.kind, meetingNames[questioner.meetingId]].concat(memberAliases),
            tags: [questioner.kind || "一般質問"],
            links: [{ type: "internal", label: "DB内で質問と答弁を開く", url: `index.html#question-${questioner.meetingId}-${questioner.memberId}` }].concat(questioner.links || [])
          });
        });
      }

      for (const session of yearData.committeeSessions || []) {
        for (const topic of session.topics || []) {
          for (const exchange of topic.exchanges || []) {
            addItem({
              id: `committee-${session.id}-${exchange.id}`,
              category: "council",
              type: "委員会質疑・答弁",
              year,
              date: session.dateIso || "",
              title: exchange.title || topic.title,
              meta: [exchange.speaker, exchange.respondent, yearData.label, session.date, session.committee, exchange.kind].filter(Boolean).join("／"),
              question: exchange.question || "",
              answer: exchange.answer || "",
              primary: [exchange.speaker, exchange.respondent, session.committee, meetingNames[session.meetingId]],
              tags: [exchange.kind || "質問", session.committee],
              links: [{ type: "internal", label: "DB内で委員会質疑を開く", url: `index.html#committee-${session.id}-${exchange.id}` }].concat(session.links || [])
            });
          }
        }
      }

    }

    function addPerson(person, type, extra = {}) {
      const aliases = aliasById.get(person.id) || person.aliases || [];
      const party = person.party || person.office || "";
      const rosterBaseUrl = extra.rosterUrl || "giin.html";
      const rosterUrl = person.id ? `${rosterBaseUrl}#member-${person.id}` : rosterBaseUrl;
      addItem({
        id: `person-${type}-${person.id || INDEX.length}`,
        category: "people",
        type,
        title: person.name || "氏名準備中",
        meta: [type, party, person.electoralDistrict, person.statusLabel].filter(Boolean).join("／"),
        body: [person.kana, person.standingCommittee, person.specialCommittee, person.career, person.occupation, person.serviceHistory].filter(Boolean).join("／"),
        primary: [person.name, person.kana, party, person.office].concat(aliases),
        tags: [],
        links: [{ type: "internal", label: "人物名簿で見る", url: rosterUrl },
          person.profileUrl ? { type: "official", label: "公式プロフィール", url: person.profileUrl } : null]
      });
    }

    for (const member of ((db.membersData && db.membersData.members) || [])) addPerson(member, "現職区議");
    for (const member of ((db.formerMembersData && db.formerMembersData.members) || [])) addPerson(member, "元職区議", { rosterUrl: "giin.html?view=former-ward" });

    const rosterLabels = {
      "current-tokyo": "現職都議", "former-tokyo": "元職都議",
      "current-house": "現職衆議", "former-house": "元職衆議",
      "current-mayor": "現職区長", "former-mayor": "元職区長"
    };
    for (const [rosterId, roster] of Object.entries((db.politiciansData && db.politiciansData.rosters) || {})) {
      for (const member of roster.members || []) {
        addPerson(member, rosterLabels[rosterId] || member.statusLabel || "政治家", { rosterUrl: `giin.html?view=${rosterId}` });
      }
    }

    const electionTypeLabels = Object.fromEntries(
      (((db.electionsData && db.electionsData.types) || []).map((item) => [item.id, item.label]))
    );
    for (const election of ((db.electionsData && db.electionsData.elections) || [])) {
      const year = dateYear(election.electionDate);
      const typeLabel = electionTypeLabels[election.type] || election.type || "選挙";
      const candidates = election.candidates || [];
      addItem({
        id: `election-${election.id || INDEX.length}`,
        category: "elections",
        type: typeLabel,
        year,
        date: election.electionDate,
        title: election.title,
        meta: [election.electionDate, typeLabel, election.district].filter(Boolean).join("／"),
        body: election.summary || "",
        primary: [election.title, election.subtype, election.district].concat(candidates.flatMap((candidate) => [candidate.name, candidate.party])),
        tags: [typeLabel, election.subtype].filter(Boolean),
        links: [{ type: "internal", label: "選挙アーカイブで見る", url: `senkyo.html#election-${election.id}` }].concat(election.sources || [])
      });
      for (const candidate of candidates) {
        addItem({
          id: `candidate-${election.id || INDEX.length}-${candidate.personId || candidate.rank || candidate.name}`,
          category: "elections",
          type: "候補者・選挙結果",
          year,
          date: election.electionDate,
          title: candidate.name,
          meta: [election.title, candidate.party, candidate.result, candidate.votesDisplay].filter(Boolean).join("／"),
          result: candidate.result || "",
          primary: [candidate.name, candidate.party, election.title, typeLabel],
          tags: [typeLabel],
          links: [{ type: "internal", label: "選挙アーカイブで見る", url: `senkyo.html#election-${election.id}` }].concat(election.sources || [])
        });
      }
    }

    const newsData = window.SHINAGAWA_NEWS || { items: [] };
    for (const news of newsData.items || []) {
      const year = dateYear(news.publishedAt || news.collectedAt);
      addItem({
        id: `news-${news.id}`,
        category: "news",
        type: "ニュース",
        year,
        date: news.publishedAt || news.collectedAt,
        title: news.title,
        meta: [news.source, news.publishedAt ? new Date(news.publishedAt).toLocaleDateString("ja-JP") : ""].filter(Boolean).join("／"),
        body: news.summary || "",
        source: news.source || "配信元不明",
        primary: [news.source].concat(news.locations || []),
        tags: (news.tags || []).concat(news.locations || []),
        relevanceScore: news.relevanceScore || 0,
        links: [
          { type: "source", label: "元記事を読む", url: news.url },
          { type: "internal", label: "ニュース一覧を見る", url: "news.html" }
        ]
      });
    }

    const synonymGroups = [
      ["子育て", "育児", "保育", "児童"],
      ["防災", "災害", "避難"],
      ["高齢者", "介護", "福祉"],
      ["再開発", "まちづくり", "都市計画"],
      ["選挙", "投票", "主権者"],
      ["ごみ", "廃棄物", "リサイクル"],
      ["学校", "教育"],
      ["商店", "店舗", "商店街"]
    ].map((group) => group.map(normalizeText));

    function variantsForTerm(term) {
      const normalized = normalizeText(term);
      const group = synonymGroups.find((items) => items.includes(normalized));
      return group || [normalized];
    }

    function scoreItem(item, terms, normalizedQuery) {
      if (!terms.length) return item.relevanceScore * .01;
      let score = 0;
      if (item.fields.title === normalizedQuery) score += 180;
      else if (normalizedQuery && item.fields.title.includes(normalizedQuery)) score += 90;
      for (const term of terms) {
        const variants = variantsForTerm(term);
        const titleMatch = variants.some((value) => item.fields.title.includes(value));
        const primaryMatch = variants.some((value) => item.fields.primary.includes(value));
        const tagMatch = variants.some((value) => item.fields.tags.includes(value));
        const bodyMatch = variants.some((value) => item.fields.body.includes(value));
        if (titleMatch) score += 55;
        if (primaryMatch) score += 34;
        if (primaryMatch && item.category === "people") score += 80;
        if (tagMatch) score += 24;
        if (bodyMatch) score += 11;
      }
      return score + Math.min(20, item.relevanceScore) * .05;
    }

    function itemMatchesTerms(item, terms) {
      return terms.every((term) => variantsForTerm(term).some((variant) => item.fields.all.includes(variant)));
    }

    function escapeRegExp(value) {
      return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function highlight(value, terms) {
      const text = String(value || "");
      const visibleTerms = [...new Set(terms.map((term) => String(term).trim()).filter(Boolean))]
        .sort((left, right) => right.length - left.length);
      if (!visibleTerms.length) return esc(text);
      const expression = new RegExp(`(${visibleTerms.map(escapeRegExp).join("|")})`, "giu");
      return text.split(expression).map((part, index) => index % 2 ? `<mark>${esc(part)}</mark>` : esc(part)).join("");
    }

    function trimText(value, maxLength = 380) {
      const text = String(value || "").trim();
      return text.length > maxLength ? `${text.slice(0, maxLength).trim()}…` : text;
    }

    const pillClasses = { video: "pill pill--video", minutes: "pill pill--minutes", minutesDraft: "pill pill--minutes", source: "pill pill--source" };
    function pillsHtml(links) {
      return linkList(links).map((link) => {
        const url = safeUrl(link.url);
        const external = /^https?:\/\//i.test(url) ? ' target="_blank" rel="noopener"' : "";
        return `<a class="${pillClasses[link.type] || "pill"}" href="${esc(url)}"${external}>${esc(link.label || "リンクを開く")}</a>`;
      }).join("");
    }

    function resultHtml(item, terms) {
      const categoryLabel = CATEGORY_LABELS[item.category] || item.category;
      const visibleTags = item.tags.filter((tag) => tag !== item.type && tag !== item.result);
      const badges = [
        item.year ? `<span class="badge badge--year">${esc(eraLabel(item.year))}</span>` : "",
        `<span class="badge${item.category === "news" ? " badge--news" : item.category === "elections" ? " badge--election" : ""}">${esc(categoryLabel)}</span>`,
        `<span class="badge">${esc(item.type)}</span>`,
        item.result ? `<span class="badge badge--result">${esc(item.result)}</span>` : ""
      ].concat(visibleTags.slice(0, 3).map((tag) => `<span class="badge">${highlight(tag, terms)}</span>`));
      let body = "";
      if (item.type === "質問・答弁" || item.type === "委員会質疑・答弁") {
        body = `<dl class="qa-summary">
          <dt>質問の要約</dt><dd>${item.question ? highlight(trimText(item.question), terms) : "要約準備中"}</dd>
          <dt>答弁の要約</dt><dd>${item.answer ? highlight(trimText(item.answer), terms) : "要約準備中"}</dd>
        </dl>`;
      } else if (item.body) {
        body = `<p class="summary">${highlight(trimText(item.body), terms)}</p>`;
      }
      return `<article class="hitrow" data-category="${esc(categoryLabel)}">
        <div class="badges">${badges.filter(Boolean).join("")}</div>
        <h2>${highlight(item.title, terms)}</h2>
        ${item.meta ? `<p class="meta">${highlight(item.meta, terms)}</p>` : ""}
        ${body}
        <div>${pillsHtml(item.links)}</div>
      </article>`;
    }

    const elements = {
      query: document.getElementById("q"),
      clear: document.getElementById("clear-query"),
      categoryTabs: document.getElementById("category-tabs"),
      type: document.getElementById("type-filter"),
      year: document.getElementById("year-filter"),
      result: document.getElementById("result-filter"),
      source: document.getElementById("source-filter"),
      tag: document.getElementById("tag-filter"),
      sort: document.getElementById("sort-order"),
      reset: document.getElementById("reset-search"),
      filterPanel: document.getElementById("filter-panel"),
      hit: document.getElementById("hit"),
      results: document.getElementById("results"),
      guide: document.getElementById("guide"),
      pagination: document.getElementById("pagination")
    };

    const state = { category: "all", page: 1 };

    function optionHtml(value, label) {
      return `<option value="${esc(value)}">${esc(label)}</option>`;
    }

    function populateSelect(element, values, firstLabel, labeler = (value) => value) {
      const current = element.value;
      element.innerHTML = optionHtml("", firstLabel) + values.map((value) => optionHtml(value, labeler(value))).join("");
      element.value = values.map(String).includes(String(current)) ? current : "";
    }

    function availableItemsForCategory() {
      return state.category === "all" ? INDEX : INDEX.filter((item) => item.category === state.category);
    }

    function refreshFilterOptions() {
      const items = availableItemsForCategory();
      const types = [...new Set(items.map((item) => item.type).filter(Boolean))].sort((a, b) => a.localeCompare(b, "ja"));
      const years = [...new Set(items.map((item) => item.year).filter(Boolean))].sort((a, b) => b - a);
      const results = [...new Set(items.map((item) => item.result).filter(Boolean))].sort((a, b) => a.localeCompare(b, "ja"));
      const sources = [...new Set(items.map((item) => item.source).filter(Boolean))].sort((a, b) => a.localeCompare(b, "ja"));
      const tags = [...new Set(items.flatMap((item) => item.tags).filter(Boolean))].sort((a, b) => a.localeCompare(b, "ja"));
      populateSelect(elements.type, types, "すべての種類");
      populateSelect(elements.year, years, "すべての年", eraLabel);
      populateSelect(elements.result, results, "すべての結果");
      populateSelect(elements.source, sources, "すべての配信元");
      populateSelect(elements.tag, tags, "すべてのタグ");
    }

    function renderCategoryTabs() {
      const counts = INDEX.reduce((map, item) => {
        map.all += 1;
        map[item.category] = (map[item.category] || 0) + 1;
        return map;
      }, { all: 0 });
      elements.categoryTabs.innerHTML = CATEGORY_DEFS.map((category) =>
        `<button class="category-button" type="button" data-category="${category.id}" aria-pressed="${state.category === category.id}">
          ${esc(category.label)}<span class="category-count">${Number(counts[category.id] || 0).toLocaleString("ja-JP")}</span>
        </button>`
      ).join("");
    }

    function hasDetailedFilter() {
      return Boolean(elements.type.value || elements.year.value || elements.result.value || elements.source.value || elements.tag.value);
    }

    function updateUrl() {
      const params = new URLSearchParams();
      if (elements.query.value.trim()) params.set("q", elements.query.value.trim());
      if (state.category !== "all") params.set("category", state.category);
      if (elements.type.value) params.set("type", elements.type.value);
      if (elements.year.value) params.set("year", elements.year.value);
      if (elements.result.value) params.set("result", elements.result.value);
      if (elements.source.value) params.set("source", elements.source.value);
      if (elements.tag.value) params.set("tag", elements.tag.value);
      if (elements.sort.value !== "relevance") params.set("sort", elements.sort.value);
      if (state.page > 1) params.set("page", String(state.page));
      const query = params.toString();
      history.replaceState(null, "", `${location.pathname}${query ? `?${query}` : ""}`);
    }

    function renderPagination(totalPages) {
      if (totalPages <= 1) {
        elements.pagination.hidden = true;
        elements.pagination.innerHTML = "";
        return;
      }
      elements.pagination.hidden = false;
      elements.pagination.innerHTML = `
        <button class="page-button" type="button" data-page="${state.page - 1}" ${state.page <= 1 ? "disabled" : ""}>前のページ</button>
        <span class="page-position">${state.page} / ${totalPages}</span>
        <button class="page-button" type="button" data-page="${state.page + 1}" ${state.page >= totalPages ? "disabled" : ""}>次のページ</button>`;
    }

    function render(resetPage = false) {
      if (resetPage) state.page = 1;
      const query = elements.query.value.trim();
      const terms = query.split(/[ 　]+/).filter(Boolean);
      const normalizedQuery = normalizeText(query);
      const browseMode = Boolean(terms.length || state.category !== "all" || hasDetailedFilter());
      elements.clear.hidden = !query;
      renderCategoryTabs();

      if (!browseMode) {
        elements.hit.textContent = `議会・人物・選挙・ニュースの全${INDEX.length.toLocaleString("ja-JP")}件から検索`;
        elements.results.innerHTML = "";
        elements.guide.hidden = false;
        elements.guide.innerHTML = `<h2>検索する内容を入力してください</h2>
          <p>人物名、テーマ、制度名、地域名などから検索できます。大分類や「詳しく絞り込む」だけを選んで一覧を見ることもできます。</p>`;
        renderPagination(0);
        updateUrl();
        return;
      }

      elements.guide.hidden = true;
      let hits = INDEX.filter((item) => {
        if (state.category !== "all" && item.category !== state.category) return false;
        if (elements.type.value && item.type !== elements.type.value) return false;
        if (elements.year.value && String(item.year) !== elements.year.value) return false;
        if (elements.result.value && item.result !== elements.result.value) return false;
        if (elements.source.value && item.source !== elements.source.value) return false;
        if (elements.tag.value && !item.tags.includes(elements.tag.value)) return false;
        return itemMatchesTerms(item, terms);
      }).map((item) => ({ item, score: scoreItem(item, terms, normalizedQuery) }));

      if (elements.sort.value === "newest") {
        hits.sort((left, right) => right.item.sortDate - left.item.sortDate || right.score - left.score);
      } else if (elements.sort.value === "oldest") {
        hits.sort((left, right) => left.item.sortDate - right.item.sortDate || right.score - left.score);
      } else {
        hits.sort((left, right) => right.score - left.score || right.item.sortDate - left.item.sortDate);
      }

      const totalPages = Math.max(1, Math.ceil(hits.length / PAGE_SIZE));
      state.page = Math.min(Math.max(1, state.page), totalPages);
      const start = (state.page - 1) * PAGE_SIZE;
      const pageItems = hits.slice(start, start + PAGE_SIZE);
      elements.hit.textContent = `${hits.length.toLocaleString("ja-JP")}件ヒット${hits.length ? `（${start + 1}〜${start + pageItems.length}件を表示）` : ""}`;
      elements.results.innerHTML = pageItems.map(({ item }) => resultHtml(item, terms)).join("");
      if (!hits.length) {
        elements.guide.hidden = false;
        elements.guide.innerHTML = `<h2>該当する情報がありません</h2><p>検索語や絞り込み条件を減らして、もう一度お試しください。</p>`;
      }
      renderPagination(hits.length ? totalPages : 0);
      updateUrl();
    }

    function setCategory(category, resetPage = true) {
      state.category = CATEGORY_DEFS.some((item) => item.id === category) ? category : "all";
      refreshFilterOptions();
      render(resetPage);
    }

    function resetSearch() {
      elements.query.value = "";
      elements.type.value = "";
      elements.year.value = "";
      elements.result.value = "";
      elements.source.value = "";
      elements.tag.value = "";
      elements.sort.value = "relevance";
      state.category = "all";
      state.page = 1;
      refreshFilterOptions();
      render();
      elements.query.focus();
    }

    const params = new URLSearchParams(location.search);
    state.category = CATEGORY_DEFS.some((item) => item.id === params.get("category")) ? params.get("category") : "all";
    elements.query.value = params.get("q") || "";
    elements.sort.value = ["relevance", "newest", "oldest"].includes(params.get("sort")) ? params.get("sort") : "relevance";
    refreshFilterOptions();
    const initialValues = {
      type: params.get("type") || "",
      year: params.get("year") || "",
      result: params.get("result") || "",
      source: params.get("source") || "",
      tag: params.get("tag") || ""
    };
    for (const [key, value] of Object.entries(initialValues)) {
      if ([...elements[key].options].some((option) => option.value === value)) elements[key].value = value;
    }
    state.page = Math.max(1, Number(params.get("page")) || 1);
    elements.filterPanel.open = hasDetailedFilter();

    let inputTimer = null;
    elements.query.addEventListener("input", () => {
      clearTimeout(inputTimer);
      inputTimer = setTimeout(() => render(true), 120);
    });
    elements.clear.addEventListener("click", () => {
      elements.query.value = "";
      render(true);
      elements.query.focus();
    });
    elements.categoryTabs.addEventListener("click", (event) => {
      const button = event.target.closest("[data-category]");
      if (button) setCategory(button.dataset.category);
    });
    [elements.type, elements.year, elements.result, elements.source, elements.tag, elements.sort]
      .forEach((element) => element.addEventListener("change", () => render(true)));
    elements.reset.addEventListener("click", resetSearch);
    elements.pagination.addEventListener("click", (event) => {
      const button = event.target.closest("[data-page]");
      if (!button || button.disabled) return;
      state.page = Number(button.dataset.page);
      render();
      document.querySelector(".content-section").scrollIntoView({ behavior: "smooth", block: "start" });
    });

    render();
  </script>
</body>
</html>
