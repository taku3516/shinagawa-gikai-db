name: 品川区ニュースを収集

on:
  schedule:
    # 日本時間 0時15分、6時15分、12時15分、18時15分
    - cron: "15 3,9,15,21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-shinagawa-news
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v6

      - name: Pythonを準備
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: ニュースを収集
        run: python scripts/collect_news.py

      - name: 更新があれば保存
        run: |
          if git diff --quiet -- data/news-items.js; then
            echo "新しい記事はありません"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news-items.js
          git commit -m "品川区ニュースを自動更新"
          git push
