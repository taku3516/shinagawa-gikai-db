<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1f4e79" />
  <title>品川区議会DB</title>
  <style>
    /* ===== 基調カラー：深い青と生成りを使った、公文書・資料庫を思わせる配色 ===== */
    :root {
      --c-main: #1f4e79;
      --c-main-dark: #173a5e;
      --c-main-pale: #e7eef4;
      --c-bg: #f4f1e8;
      --c-card: #fffdf8;
      --c-ink: #17212b;
      --c-ink-soft: #4f5d68;
      --c-border: #b9c3cc;
      --c-rule: #d8d2c4;
      /* 機能別の色分け */
      --c-video-bg: #fff1f2;      /* 録画リンク＝赤系 */
      --c-video-border: #fecaca;
      --c-video-text: #be123c;
      --c-minutes-bg: #f0fdf4;    /* 議事録リンク＝緑系 */
      --c-minutes-border: #bbf7d0;
      --c-minutes-text: #15803d;
      --c-result-bg: #fef3c7;     /* 議決結果タグ＝黄系 */
      --c-result-text: #92400e;
    }

    * { box-sizing: border-box; }

    html {
      /* スマホの画面回転時に文字サイズが勝手に拡大されるのを防ぐ */
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--c-bg);
      color: var(--c-ink);
      /* 長いURL・英数字の連続でも画面外にはみ出さないよう折り返す */
      overflow-wrap: break-word;
    }

    a { color: var(--c-main-dark); font-weight: 700; text-decoration-thickness: 1px; text-underline-offset: 3px; }
    a:hover { text-decoration-thickness: 2px; }

    .container { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }

    /* ===== ヒーロー ===== */
    .hero {
      padding: 46px 0 34px; border-top: 6px solid var(--c-main); border-bottom: 1px solid var(--c-rule);
      background: var(--c-card);
    }
    .hero h1 { margin: 0 0 16px; color: var(--c-main-dark); font-size: clamp(34px, 6vw, 60px); line-height: 1.08; letter-spacing: -0.025em; }
    .hero .lead { max-width: 780px; margin: 0; font-size: 18px; line-height: 1.9; }
    .disclaimer {
      margin-top: 24px; max-width: none; padding: 14px 16px;
      border: 1px solid var(--c-border); border-left: 4px solid var(--c-main); border-radius: 3px;
      background: var(--c-card); font-size: clamp(11px, 1.25vw, 14px); line-height: 1.7;
      white-space: nowrap;
    }
    .hero-links { margin: 16px 0 0; }

    /* ===== 統計カード（定例会ごとの会期・議案数） ===== */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-top: 28px; }
    .stats--section { margin: 0 0 24px; }
    .stat { border: 1px solid var(--c-border); border-top: 3px solid var(--c-main); border-radius: 3px; background: var(--c-card); padding: 16px; }
    .stat strong { display: block; color: var(--c-main); font-size: 28px; line-height: 1.1; }
    .stat span { color: var(--c-ink-soft); font-size: 13px; font-weight: 700; }

    /* ===== セクション共通 ===== */
    section { padding: 40px 0; }
    h2 { margin: 0 0 20px; font-size: 24px; }
    h2.sub { margin-top: 36px; }
    h3.group-title { margin: 32px 0 12px; }
    .section-lead { max-width: 760px; margin: -8px 0 24px; color: var(--c-ink-soft); font-size: 14px; line-height: 1.8; }

    /* ===== リンクピル（種類別に色分け） ===== */
    .pill {
      display: inline-flex; align-items: center; margin: 14px 6px 0 0;
      border: 1px solid var(--c-border); border-radius: 3px;
      background: var(--c-card); padding: 6px 12px;
      color: var(--c-main-dark); font-size: 13px; font-weight: 800;
    }
    .pill--video { border-color: var(--c-video-border); background: var(--c-video-bg); color: var(--c-video-text); }
    .pill--minutes { border-color: var(--c-minutes-border); background: var(--c-minutes-bg); color: var(--c-minutes-text); }

    /* ===== タグ ===== */
    .tag {
      display: inline-flex; margin: 0 8px 12px 0; border-radius: 3px;
      background: var(--c-main-pale); padding: 4px 9px;
      color: var(--c-main-dark); font-size: 12px; font-weight: 800;
    }
    .tag--result { background: var(--c-result-bg); color: var(--c-result-text); }
    .chip {
      display: inline-flex; margin-bottom: 10px; border: 1px solid var(--c-border); border-radius: 3px;
      background: #f6f4ed; padding: 3px 9px; color: #334452; font-size: 12px; font-weight: 800;
    }

    /* ===== 年切り替え ===== */
    .year-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 12px; margin: 0 0 20px; }
    .year-row label { color: var(--c-ink-soft); font-size: 14px; font-weight: 800; white-space: nowrap; }
    #year-select {
      /* 16px未満だとiOSがフォーカス時に画面を自動ズームするため16pxにする */
      width: min(100%, 320px); border: 1px solid var(--c-border); border-radius: 3px;
      background: var(--c-card); padding: 10px 12px; color: var(--c-ink); font-size: 16px; font-weight: 800;
    }
    .year-summary {
      border: 1px solid var(--c-border); border-left: 4px solid var(--c-main); border-radius: 3px;
      background: var(--c-card); padding: 18px; margin-bottom: 18px;
    }
    .year-summary h3 { margin: 0 0 8px; font-size: 18px; }
    .year-summary p { margin: 0; color: var(--c-ink-soft); font-size: 14px; line-height: 1.8; }

    /* ===== 会議カード ===== */
    .meeting-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 14px; }
    .meeting-card { border: 1px solid var(--c-border); border-radius: 3px; background: var(--c-card); padding: 18px; }
    .meeting-card h3 { margin: 0 0 8px; font-size: 17px; line-height: 1.45; }
    .meeting-card p { margin: 0; color: var(--c-ink-soft); font-size: 14px; line-height: 1.75; }

    /* ===== 会議ごとの折りたたみ ===== */
    .accordion-controls {
      position: sticky; top: 0; z-index: 20;
      border-top: 1px solid var(--c-border); border-bottom: 1px solid var(--c-border);
      background: rgba(244, 241, 232, 0.97); padding: 8px 0;
      box-shadow: 0 2px 5px rgba(23, 33, 43, 0.1);
      backdrop-filter: blur(8px);
    }
    .accordion-controls__inner { display: flex; align-items: center; gap: 8px; }
    .accordion-controls__label { margin-right: auto; font-size: 14px; font-weight: 800; }
    .accordion-controls__status { color: var(--c-ink-soft); font-size: 12px; font-weight: 700; }
    .accordion-button {
      min-height: 40px; border: 1px solid var(--c-main); border-radius: 3px;
      background: var(--c-card); padding: 8px 14px; color: var(--c-main-dark);
      font: inherit; font-size: 13px; font-weight: 800; cursor: pointer;
    }
    .accordion-button:hover { background: var(--c-main-pale); }
    .accordion-button:focus-visible, .meeting-accordion > summary:focus-visible,
    .record-section > summary:focus-visible, .card.q > summary:focus-visible {
      outline: 3px solid #f59e0b; outline-offset: 3px;
    }
    .accordion-button:disabled { opacity: 0.45; cursor: default; }
    .accordion-list { display: grid; gap: 16px; padding: 24px 0 40px; }
    .meeting-accordion {
      overflow: clip; border: 1px solid var(--c-border); border-radius: 4px;
      background: var(--c-card); scroll-margin-top: 76px;
    }
    .meeting-accordion[open] { box-shadow: 0 3px 10px rgba(23, 33, 43, 0.08); }
    .meeting-accordion > summary {
      display: grid; grid-template-columns: 1fr auto; gap: 16px; align-items: center;
      min-height: 88px; padding: 18px 20px; cursor: pointer; list-style: none;
    }
    .meeting-accordion > summary::-webkit-details-marker { display: none; }
    .meeting-accordion > summary:hover { background: var(--c-main-pale); }
    .meeting-accordion[open] > summary {
      border-bottom: 1px solid var(--c-border); background: var(--c-main-pale);
    }
    .meeting-accordion__heading { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 10px; }
    .meeting-accordion__heading .chip { margin: 0; }
    .meeting-accordion__title { font-size: 21px; font-weight: 800; line-height: 1.35; }
    .meeting-accordion__summary {
      grid-column: 1 / -1; margin: 2px 0 0; color: var(--c-ink-soft);
      font-size: 14px; line-height: 1.7;
    }
    .meeting-accordion__counts { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .meeting-accordion__count {
      border: 1px solid var(--c-border); border-radius: 3px; background: #f6f4ed; padding: 3px 9px;
      color: #374151; font-size: 12px; font-weight: 800;
    }
    .meeting-accordion__icon {
      display: inline-grid; place-items: center; width: 36px; height: 36px;
      border-radius: 3px; background: var(--c-main); color: #fff;
      font-size: 22px; font-weight: 800; line-height: 1;
    }
    .meeting-accordion__icon::before { content: "+"; }
    .meeting-accordion[open] .meeting-accordion__icon::before { content: "−"; }
    .meeting-accordion__content section { padding: 32px 0 40px; }

    /* ===== タイムライン ===== */
    .timeline { display: grid; gap: 12px; }
    .timeline-item {
      display: grid; grid-template-columns: 120px 1fr; gap: 16px;
      border-left: 4px solid var(--c-main); border-radius: 3px;
      background: var(--c-card); padding: 16px;
    }
    .timeline-item time { color: var(--c-main); font-weight: 800; }
    .timeline-item p { margin: 6px 0 0; color: var(--c-ink-soft); font-size: 14px; line-height: 1.75; }

    /* ===== カードグリッド（議案・質問） ===== */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
    .card-grid.pushed { margin-top: 20px; }
    .card { border: 1px solid var(--c-border); border-radius: 3px; background: var(--c-card); padding: 20px; }
    .card h3 { margin: 0 0 10px; font-size: 18px; line-height: 1.5; }
    .card p { margin: 0; color: var(--c-ink-soft); font-size: 14px; line-height: 1.8; }
    .card ul { margin: 0; padding-left: 20px; color: var(--c-ink-soft); font-size: 14px; line-height: 1.8; }
    .card.q { padding: 0; overflow: clip; }
    .card.q > summary { display: flex; align-items: center; gap: 12px; min-height: 56px; padding: 14px 16px; cursor: pointer; list-style: none; }
    .card.q > summary::-webkit-details-marker { display: none; }
    .card.q > summary:hover, .card.q[open] > summary { background: var(--c-main-pale); }
    .card.q > summary h3 { flex: 1; margin: 0; font-size: 16px; }
    .q__count { color: var(--c-ink-soft); font-size: 12px; font-weight: 800; white-space: nowrap; }
    .q__icon { color: var(--c-main); font-size: 20px; font-weight: 900; }
    .q__icon::before { content: "+"; }
    .card.q[open] .q__icon::before { content: "−"; }
    .q__content { border-top: 1px solid var(--c-border); padding: 18px 20px 20px; }
    .question-card-grid--summaries { grid-template-columns: 1fr; }
    .q__topics-label {
      margin: 0 0 4px !important; color: var(--c-ink) !important;
      font-size: 13px !important; font-weight: 800;
    }
    .qa-summaries {
      display: grid; gap: 12px; margin-top: 20px; padding-top: 18px;
      border-top: 1px solid var(--c-border);
    }
    .qa-summaries > h4 { margin: 0; font-size: 15px; }
    .qa-summary {
      border-left: 4px solid var(--c-main); border-radius: 2px;
      background: #f3f6f8; padding: 14px 16px;
    }
    .qa-summary h5 { margin: 0 0 10px; font-size: 15px; line-height: 1.55; }
    .qa-summary dl { display: grid; grid-template-columns: 5em 1fr; gap: 8px 12px; margin: 0; }
    .qa-summary dt { color: var(--c-main-dark); font-size: 13px; font-weight: 800; }
    .qa-summary dd { margin: 0; color: var(--c-ink-soft); font-size: 14px; line-height: 1.8; }
    .qa-summary-note { margin-top: 14px !important; }

    /* ===== 委員会の質疑・答弁 ===== */
    .committee-session {
      border: 1px solid var(--c-border); border-radius: 3px; background: var(--c-card); overflow: clip;
    }
    .committee-session > summary, .committee-topic > summary {
      display: flex; align-items: center; gap: 12px; min-height: 64px; padding: 14px 16px;
      cursor: pointer; list-style: none;
    }
    .committee-session > summary::-webkit-details-marker, .committee-topic > summary::-webkit-details-marker { display: none; }
    .committee-session > summary:hover, .committee-session[open] > summary,
    .committee-topic > summary:hover, .committee-topic[open] > summary { background: var(--c-main-pale); }
    .committee-session__summary-main, .committee-topic__summary-main { flex: 1; min-width: 0; }
    .committee-session__head { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
    .committee-session__head .tag { margin: 0; }
    .committee-session h3 { width: 100%; margin: 4px 0 0; font-size: 18px; }
    .committee-session__meta { margin: 0 0 12px; color: var(--c-ink-soft); font-size: 13px; font-weight: 700; }
    .committee-session__overview { margin: 7px 0 0; color: var(--c-ink-soft); font-size: 13px; line-height: 1.65; }
    .committee-session__count, .committee-topic__count { color: var(--c-main-dark); font-size: 12px; font-weight: 900; white-space: nowrap; }
    .committee-toggle-icon { color: var(--c-main); font-size: 22px; font-weight: 900; }
    .committee-toggle-icon::before { content: "+"; }
    details[open] > summary .committee-toggle-icon::before { content: "−"; }
    .committee-session__content { border-top: 1px solid var(--c-border); padding: 18px; }
    .committee-topics { display: grid; gap: 12px; }
    .committee-topic { border: 1px solid var(--c-rule); border-radius: 3px; background: #fff; overflow: clip; }
    .committee-topic h4 { margin: 0; color: var(--c-main-dark); font-size: 16px; }
    .committee-topic__agenda { margin: 0 0 12px; color: var(--c-ink-soft); font-size: 12px; font-weight: 700; }
    .committee-topic__content { border-top: 1px solid var(--c-rule); padding: 14px; }
    .committee-exchanges { display: grid; gap: 12px; }
    .committee-exchange { border-left: 4px solid var(--c-main); border-radius: 2px; background: #f3f6f8; padding: 14px 16px; }
    .committee-exchange__head { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 10px; }
    .committee-exchange__head h5 { margin: 0; font-size: 15px; }
    .committee-exchange__kind { border: 1px solid var(--c-border); border-radius: 3px; background: var(--c-card); padding: 2px 7px; color: var(--c-main-dark); font-size: 11px; font-weight: 800; }
    .committee-exchange dl { display: grid; grid-template-columns: 8em 1fr; gap: 8px 12px; margin: 0; }
    .committee-exchange dt { color: var(--c-main-dark); font-size: 13px; font-weight: 800; }
    .committee-exchange dd { margin: 0; color: var(--c-ink-soft); font-size: 14px; line-height: 1.8; }
    .committee-session__links { margin-top: 18px; }
    .committee-pending { border: 1px dashed var(--c-border); border-radius: 3px; background: #f7f8fa; padding: 14px 16px; }
    .committee-pending strong { display: block; margin-bottom: 5px; }
    .committee-pending p { margin: 0; color: var(--c-ink-soft); font-size: 13px; }

    /* ===== 一覧行（請願・会議録） ===== */
    .rows { display: grid; gap: 10px; }
    .rows .row {
      display: grid; grid-template-columns: minmax(150px, 210px) 1fr auto; gap: 12px; align-items: start;
      border: 1px solid var(--c-border); border-radius: 3px; background: var(--c-card);
      padding: 14px; font-size: 14px;
    }
    .row .key { color: var(--c-main-dark); font-weight: 800; }
    .row .result {
      border-radius: 3px; background: var(--c-result-bg); color: var(--c-result-text);
      padding: 4px 10px; font-size: 12px; font-weight: 800; white-space: nowrap;
    }
    .row .pill { margin-top: 0; }

    /* ===== 注意書き・補足 ===== */
    .notice {
      margin: 0 0 20px; padding: 14px 16px;
      border: 1px solid var(--c-border); border-left: 4px solid var(--c-main); border-radius: 3px;
      background: var(--c-card); font-size: 14px; line-height: 1.7;
    }
    .fine-print { margin: 10px 0 0; color: var(--c-ink-soft); font-size: 12px; line-height: 1.7; }

    /* ===== 参照元・フッター ===== */
    .sources { border-top: 1px solid var(--c-border); background: var(--c-card); }
    .sources ul { margin: 0; padding-left: 20px; line-height: 1.9; }
    footer {
      border-top: 1px solid var(--c-border);
      background: var(--c-main-dark);
      padding: 32px 0; text-align: center; font-size: 13px; line-height: 1.8; color: #fff;
    }

    /* ===== エラー表示 ===== */
    .load-error {
      margin: 40px auto; max-width: 720px; padding: 20px;
      border: 1px solid var(--c-video-border); border-radius: 8px;
      background: var(--c-video-bg); font-size: 14px; line-height: 1.9;
    }
    .load-error code { background: #fff; padding: 2px 6px; border-radius: 4px; }

    /* アンカーリンクで飛んだとき固定操作バーの下に見出しが収まるよう余白を取る */
    section[id], h2[id], h3[id], .card.q[id], .record-section[id],
    .committee-session[id], .committee-topic[id], .committee-exchange[id] { scroll-margin-top: 76px; }

    /* ===== 件数の多い資料種別をまとめる内側の折りたたみ ===== */
    .record-section { margin-top: 30px; border: 1px solid var(--c-border); border-top: 3px solid var(--c-main); border-radius: 3px; background: #faf9f4; }
    .record-section > summary { display: flex; align-items: center; gap: 12px; min-height: 60px; padding: 13px 16px; cursor: pointer; list-style: none; }
    .record-section > summary::-webkit-details-marker { display: none; }
    .record-section > summary:hover, .record-section[open] > summary { background: var(--c-main-pale); }
    .record-section__title { flex: 1; }
    .record-section__title strong { display: block; color: var(--c-main-dark); font-size: 18px; }
    .record-section__title span { display: block; margin-top: 3px; color: var(--c-ink-soft); font-size: 13px; line-height: 1.55; }
    .record-section__count { color: var(--c-main-dark); font-size: 13px; font-weight: 900; white-space: nowrap; }
    .record-section__icon { color: var(--c-main); font-size: 22px; font-weight: 900; }
    .record-section__icon::before { content: "+"; }
    .record-section[open] .record-section__icon::before { content: "−"; }
    .record-section__content { border-top: 1px solid var(--c-border); padding: 18px; }

    /* ===== スマホ向け調整 ===== */
    @media (max-width: 640px) {
      .timeline-item, .rows .row { grid-template-columns: 1fr; gap: 8px; }
      /* 議決結果タグが横幅いっぱいに伸びないようにする */
      .row .result { justify-self: start; }

      /* 余白を詰めて1画面の情報量を確保する */
      .hero { padding: 36px 0 28px; }
      section { padding: 28px 0; }
      .hero .lead { font-size: 16px; line-height: 1.8; }
      .disclaimer { font-size: 13px; white-space: normal; }
      h2 { font-size: 21px; }
      .card { padding: 16px; }
      .card.q { padding: 0; }
      .meeting-card { padding: 16px; }
      .qa-summary { padding: 13px 14px; }
      .qa-summary dl { grid-template-columns: 1fr; gap: 4px; }
      .qa-summary dd + dt { margin-top: 6px; }
      .committee-session > summary, .committee-topic > summary { min-height: 72px; padding: 13px; }
      .committee-session__content { padding: 12px; }
      .committee-session h3 { font-size: 16px; }
      .committee-session__count, .committee-topic__count { white-space: normal; text-align: right; }
      .committee-exchange { padding: 13px 14px; }
      .committee-exchange dl { grid-template-columns: 1fr; gap: 4px; }
      .committee-exchange dd + dt { margin-top: 6px; }

      .accordion-controls__inner { flex-wrap: nowrap; gap: 6px; }
      .accordion-controls__label { display: none; }
      .accordion-controls__status { margin-right: auto; }
      .accordion-button { min-height: 44px; padding: 8px 9px; font-size: 12px; }
      .accordion-list { padding-top: 16px; }
      .meeting-accordion > summary { grid-template-columns: 1fr auto; min-height: 96px; padding: 16px; }
      .meeting-accordion__title { font-size: 18px; }
      .meeting-accordion__summary { font-size: 13px; }
      .record-section { margin-top: 22px; }
      .record-section > summary { min-height: 64px; padding: 12px; }
      .record-section__title strong { font-size: 16px; }
      .record-section__content { padding: 12px; }
      .q__content { padding: 16px; }

      /* 指でタップしやすいようリンクピルを大きくする */
      .pill { padding: 9px 14px; font-size: 14px; }
    }

    @media print {
      .accordion-controls { display: none; }
      .meeting-accordion { break-inside: avoid; }
      .meeting-accordion > summary { border-bottom: 1px solid var(--c-border); }
      .meeting-accordion > :not(summary) { display: block !important; }
      .record-section > :not(summary), .card.q > :not(summary) { display: block !important; }
    }
  </style>
</head>
<body>
  <main>
    <!-- ヒーロー：サイト名・説明・免責・統計（JSで描画） -->
    <div class="hero">
      <div class="container" id="hero-root"></div>
    </div>

    <!-- 年切り替え＋年間の流れ -->
    <section>
      <div class="container">
        <h2>年別に見る</h2>
        <div class="year-row">
          <label for="year-select">表示する年</label>
          <select id="year-select" aria-label="表示する年を選択"></select>
        </div>
        <div id="year-overview"></div>
      </div>
    </section>

    <!-- 全会議の開閉操作（スクロール中も上部に固定） -->
    <div class="accordion-controls" id="accordion-controls" hidden>
      <div class="container accordion-controls__inner">
        <span class="accordion-controls__label">会議の詳細</span>
        <span class="accordion-controls__status" id="accordion-status" aria-live="polite"></span>
        <button class="accordion-button" id="open-all" type="button">すべて開く</button>
        <button class="accordion-button" id="close-all" type="button">すべて閉じる</button>
      </div>
    </div>

    <!-- 各会議の詳細・議案・請願陳情・質問・会議録（JSで描画） -->
    <div id="detail-root"></div>

    <!-- 参照元 -->
    <section class="sources">
      <div class="container" id="sources-root"></div>
    </section>
  </main>

  <footer>
    <div class="container" id="footer-root"></div>
  </footer>

  <!-- データ読み込み（script形式なので file:// のダブルクリックでも動く） -->
  <script src="data/site.js"></script>
  <script src="data/r08.js"></script>
  <script src="data/r08-complete.js"></script>
  <script src="data/r08-committees.js"></script>
  <script src="data/r08-committees-part-01.js"></script>
  <script src="data/r08-committees-part-02.js"></script>
  <script src="data/r08-committees-part-03.js"></script>
  <script src="data/r08-committees-part-04.js"></script>
  <script src="data/r08-committees-part-05.js"></script>
  <script src="data/r08-committees-part-06.js"></script>
  <script src="data/r08-committees-part-07.js"></script>
  <script src="data/r08-committees-part-08.js"></script>
  <script src="data/r08-committees-part-09.js"></script>
  <script src="data/r08-committees-part-10.js"></script>
  <script src="data/r08-committees-part-11.js"></script>
  <script src="data/r08-committees-part-12.js"></script>
  <script src="data/r08-committees-part-13.js"></script>
  <script src="data/r08-committees-part-14.js"></script>
  <script src="data/r08-committees-part-15.js"></script>
  <script src="data/r08-committees-part-16.js"></script>

  <script>
    "use strict";

    /* ---------- ユーティリティ ---------- */

    // HTMLエスケープ（データ由来の文字列は必ずこれを通す）
    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, (c) => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
      ));
    }

    // 年データを取得する。data/*.js が window.SHINAGAWA_DB に登録する方式なので、
    // ローカルでダブルクリックして開いても（file://）動作する
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src;
        s.onload = resolve;
        s.onerror = () => reject(new Error(`${src} の読み込みに失敗しました`));
        document.head.appendChild(s);
      });
    }

    async function loadYearData(meta) {
      const db = window.SHINAGAWA_DB;
      if (!db.years[meta.id]) await loadScript(meta.file);
      const year = db.years[meta.id];
      if (!year) throw new Error(`${meta.file} に ${meta.id} のデータが見つかりません`);

      // 全件表示用の補足データがある年は、基礎データの後に一度だけ読み込む。
      db.loadedSupplements = db.loadedSupplements || {};
      if (meta.supplement && !db.loadedSupplements[meta.supplement]) {
        await loadScript(meta.supplement);
        db.loadedSupplements[meta.supplement] = true;
      }
      return year;
    }

    /* ---------- 部品の描画 ---------- */

    // リンクの種類ごとの色クラス（official=青 / video=赤 / minutes・minutesDraft=緑）
    const PILL_CLASS = {
      official: "pill",
      video: "pill pill--video",
      minutes: "pill pill--minutes",
      minutesDraft: "pill pill--minutes"
    };

    // リンクピル1個分のHTML（外部サイトのみ新しいタブで開く。#アンカーやサイト内ページはそのまま遷移）
    function pillHtml(link) {
      const cls = PILL_CLASS[link.type] || "pill";
      const isExternal = /^https?:/.test(String(link.url));
      const target = isExternal ? ' target="_blank" rel="noopener"' : "";
      return `<a class="${cls}" href="${esc(link.url)}"${target}>${esc(link.label)}</a>`;
    }

    // リンク一覧のHTML。校正原稿PDFが含まれる場合は案内文を自動で添える
    function pillsHtml(links, site) {
      if (!links || links.length === 0) return "";
      let html = links.map(pillHtml).join("\n");
      if (links.some((l) => l.type === "minutesDraft")) {
        html += `<p class="fine-print">※${esc(site.draftPdfNote)}
          <a href="https://kaigiroku.city.shinagawa.tokyo.jp/index.php/" target="_blank" rel="noopener">会議録検索システムを開く</a></p>`;
      }
      return html;
    }

    // タグ列（分野タグ＋議決結果タグ）のHTML
    function tagsHtml(tags, result) {
      const t = (tags || []).map((tag) => `<span class="tag">${esc(tag)}</span>`).join("");
      const r = result ? `<span class="tag tag--result">${esc(result)}</span>` : "";
      return t + r;
    }

    /* ---------- セクションの描画 ---------- */

    // ヒーロー（サイト名・説明・免責・入口リンク）
    // ※会期・議案数などの統計は年間で共通ではないため、各定例会のセクションに表示する
    function renderHero(site) {
      document.getElementById("hero-root").innerHTML = `
        <h1>${esc(site.siteName)}</h1>
        <p class="lead">${esc(site.lead)}</p>
        <div class="disclaimer">${esc(site.disclaimer)}</div>
        <p class="hero-links">${(site.heroLinks || []).map(pillHtml).join("\n")}</p>`;
    }

    // 統計カード（会期・議案数など。meeting.stats を持つ会議のセクション冒頭に出す）
    function statsHtml(stats) {
      if (!stats || stats.length === 0) return "";
      const cells = stats.map((s) =>
        `<div class="stat"><strong>${esc(s.value)}</strong><span>${esc(s.label)}</span></div>`
      ).join("");
      return `<div class="stats stats--section">${cells}</div>`;
    }

    // 年セレクトボックス
    function renderYearSelect(site, currentId) {
      const sel = document.getElementById("year-select");
      sel.innerHTML = (site.years || []).map((y) =>
        `<option value="${esc(y.id)}"${y.available ? "" : " disabled"}${y.id === currentId ? " selected" : ""}>${esc(y.label)}</option>`
      ).join("");
    }

    // 会議に紐づく議案・請願・質問をまとめて取得する
    function relatedItems(meeting, year) {
      return {
        bills: (year.bills || []).filter((b) => b.meetingId === meeting.id),
        petitions: (year.petitions || []).filter((p) => p.meetingId === meeting.id),
        questions: (year.questions || []).filter((q) => q.meetingId === meeting.id),
        committeeSessions: (year.committeeSessions || []).filter((session) => session.meetingId === meeting.id),
        committeePending: (year.committeePending || []).filter((session) => session.meetingId === meeting.id)
      };
    }

    // タイムラインまたは関連情報を持つ会議だけ詳細を表示する
    function hasMeetingDetails(meeting, year) {
      const related = relatedItems(meeting, year);
      return (meeting.events && meeting.events.length > 0) ||
        related.bills.length > 0 || related.petitions.length > 0 || related.questions.length > 0 ||
        related.committeeSessions.length > 0 || related.committeePending.length > 0;
    }

    // 折りたたみ見出しに表示する件数
    function meetingCountsHtml(meeting, related) {
      const counts = [];
      if (meeting.events && meeting.events.length > 0) counts.push(`日程 ${meeting.events.length}件`);
      if (related.bills.length > 0) counts.push(`議案 ${related.bills.length}件`);
      if (related.petitions.length > 0) counts.push(`請願・陳情 ${related.petitions.length}件`);
      if (related.questions.length > 0) counts.push(`質問者 ${related.questions.length}名`);
      const committeeExchangeCount = related.committeeSessions.reduce((total, session) =>
        total + (session.topics || []).reduce((topicTotal, topic) => topicTotal + (topic.exchanges || []).length, 0), 0);
      if (committeeExchangeCount > 0) counts.push(`委員会質疑 ${committeeExchangeCount}件`);
      if (related.committeePending.length > 0) counts.push(`会議録待ち ${related.committeePending.length}会議`);
      if (counts.length === 0) return "";
      return `<span class="meeting-accordion__counts">${counts.map((count) =>
        `<span class="meeting-accordion__count">${esc(count)}</span>`).join("")}</span>`;
    }

    // 年の概要＋会議カード一覧
    function renderYearOverview(year, site) {
      const cards = (year.meetings || []).map((m) => `
        <article class="meeting-card">
          <span class="chip">${esc(m.monthLabel)}</span>
          <h3>${esc(m.name)}</h3>
          <p>${esc(m.summary)}</p>
          ${pillsHtml(m.links, site)}
          ${hasMeetingDetails(m, year) ? `<a class="pill" href="#meeting-${esc(m.id)}">この会議の詳細へ</a>` : ""}
        </article>`).join("");
      document.getElementById("year-overview").innerHTML = `
        <div class="year-summary">
          <h3>${esc(year.yearSummary.title)}</h3>
          <p>${esc(year.yearSummary.text)}</p>
        </div>
        <div class="meeting-grid">${cards}</div>`;
    }

    // タイムライン（日付ごとの出来事）
    function timelineHtml(events, site) {
      const items = (events || []).map((ev) => `
        <div class="timeline-item">
          <time>${esc(ev.date)}</time>
          <div>
            <strong>${esc(ev.title)}</strong>
            <p>${esc(ev.description)}</p>
            ${pillsHtml(ev.links, site)}
            ${ev.note ? `<p class="fine-print">${esc(ev.note)}</p>` : ""}
          </div>
        </div>`).join("");
      return `<div class="timeline">${items}</div>`;
    }

    // 議案カード
    function billCardHtml(bill, site) {
      return `
        <article class="card">
          ${tagsHtml(bill.tags, bill.result)}
          <h3>${esc(bill.title)}</h3>
          <p>${esc(bill.summary)}</p>
          ${pillsHtml(bill.links, site)}
        </article>`;
    }

    // 請願・陳情の行
    function petitionRowHtml(p, site) {
      return `
        <div class="row">
          <span class="key">${esc(p.number)}</span>
          <span>${esc(p.title)}<br />${pillsHtml(p.links, site)}</span>
          <span class="result">${esc(p.result)}</span>
        </div>`;
    }

    // 件数の多い資料を、件数と説明が閉じた状態でも分かる内側の折りたたみにする
    function recordSectionHtml({ id, title, lead, countLabel, content, open = false }) {
      return `<details class="record-section" id="${esc(id)}"${open ? " open" : ""}>
        <summary>
          <span class="record-section__title">
            <strong>${esc(title)}</strong>
            ${lead ? `<span>${esc(lead)}</span>` : ""}
          </span>
          <span class="record-section__count">${esc(countLabel)}</span>
          <span class="record-section__icon" aria-hidden="true"></span>
        </summary>
        <div class="record-section__content">${content}</div>
      </details>`;
    }

    // 質問カード（議員名・会派・テーマ）
    function questionCardHtml(q, site) {
      const topics = (q.topics || []).map((t) => `<li>${esc(t)}</li>`).join("");
      const qaSummaries = (q.qaSummaries || []).map((item) => `
        <div class="qa-summary">
          <h5>${esc(item.title)}</h5>
          <dl>
            <dt>質問の要約</dt>
            <dd>${esc(item.question)}</dd>
            <dt>答弁の要約</dt>
            <dd>${esc(item.answer)}</dd>
          </dl>
        </div>`).join("");
      return `
        <details class="card q" id="question-${esc(q.meetingId)}-${esc(q.memberId)}">
          <summary>
            <h3>${esc(q.member)}（${esc(q.party)}）</h3>
            <span class="q__count">質問 ${esc((q.topics || []).length)}項目</span>
            <span class="q__icon" aria-hidden="true"></span>
          </summary>
          <div class="q__content">
            <p class="q__topics-label">質問項目（全件）</p>
            <ul>${topics}</ul>
            ${qaSummaries ? `<div class="qa-summaries" aria-label="${esc(q.member)}議員の質問と答弁の要約">
            <h4>会議録からの要約</h4>
            ${qaSummaries}
          </div>
          <p class="fine-print qa-summary-note">※質問・答弁の要点を本サイトで要約しています。正確な発言は公式の会議録をご確認ください。</p>` : ""}
            ${pillsHtml(q.links, site)}
          </div>
        </details>`;
    }

    function committeeExchangeCount(session) {
      return (session.topics || []).reduce((total, topic) => total + (topic.exchanges || []).length, 0);
    }

    // 初期DOMを軽くするため、会議見出しだけを先に描画し、開いた会議の中身だけを生成する。
    function committeeSessionsHtml(sessions, pending) {
      const published = sessions.map((session) => `<details class="committee-session" id="committee-${esc(session.id)}" data-session-id="${esc(session.id)}">
        <summary>
          <span class="committee-session__summary-main">
            <span class="committee-session__head">
              <span class="tag">${esc(session.status || "委員会質疑")}</span>
              <h3>${esc(session.date)} ${esc(session.committee)}</h3>
            </span>
            <span class="committee-session__overview">${esc(session.overview)}</span>
          </span>
          <span class="committee-session__count">${committeeExchangeCount(session)}件</span>
          <span class="committee-toggle-icon" aria-hidden="true"></span>
        </summary>
        <div class="committee-session__content" data-session-content></div>
      </details>`).join("");
      const waiting = pending.map((session) => `<article class="committee-pending" id="committee-${esc(session.id)}">
        <strong>${esc(session.date)} ${esc(session.committee)}</strong>
        <p>${esc(session.status)} — 会議録が公開されるまで要約は作成しません。
          ${session.officialUrl ? `<a href="${esc(session.officialUrl)}" target="_blank" rel="noopener">公式カレンダーを確認</a>` : ""}</p>
      </article>`).join("");
      return `<div class="committee-topics">${published}${waiting}</div>`;
    }

    function committeeTopicHtml(session, topic) {
      const exchanges = (topic.exchanges || []).map((item) => `
        <article class="committee-exchange" id="committee-${esc(session.id)}-${esc(item.id)}">
          <div class="committee-exchange__head">
            <h5>${esc(item.speaker)}</h5>
            <span class="committee-exchange__kind">${esc(item.kind || "質問")}</span>
          </div>
          <dl>
            <dt>質問・意見の要点</dt>
            <dd>${esc(item.question)}</dd>
            <dt>答弁・対応の要点</dt>
            <dd>${esc(item.answer)}</dd>
            ${item.respondent ? `<dt>答弁・対応者</dt><dd>${esc(item.respondent)}</dd>` : ""}
          </dl>
        </article>`).join("");
      return `<details class="committee-topic" id="committee-${esc(session.id)}-${esc(topic.id)}">
        <summary>
          <span class="committee-topic__summary-main"><h4>${esc(topic.title)}</h4></span>
          <span class="committee-topic__count">${(topic.exchanges || []).length}件</span>
          <span class="committee-toggle-icon" aria-hidden="true"></span>
        </summary>
        <div class="committee-topic__content">
          ${topic.agenda ? `<p class="committee-topic__agenda">議題：${esc(topic.agenda)}</p>` : ""}
          <div class="committee-exchanges">${exchanges}</div>
        </div>
      </details>`;
    }

    let activeYear = null;
    let activeSite = null;

    function renderCommitteeSession(details) {
      if (!details || details.dataset.rendered === "true" || !activeYear) return;
      const session = (activeYear.committeeSessions || []).find((item) => item.id === details.dataset.sessionId);
      const content = details.querySelector("[data-session-content]");
      if (!session || !content) return;
      content.innerHTML = `
        ${session.time ? `<p class="committee-session__meta">開催時間：${esc(session.time)}</p>` : ""}
        <div class="committee-topics">${(session.topics || []).map((topic) => committeeTopicHtml(session, topic)).join("")}</div>
        <p class="fine-print qa-summary-note">※質問・答弁の要点を本サイトで要約しています。明確な回答が記録されていない発言には、その旨を記載しています。正確な発言は公式の会議録をご確認ください。</p>
        <div class="committee-session__links">${pillsHtml(session.links, activeSite)}</div>`;
      details.dataset.rendered = "true";
      setupDetailsAccessibility(content);
    }

    // 会議1件分の詳細セクション（タイムライン＋関連する議案・請願・質問）
    function meetingSectionHtml(meeting, year, site) {
      const related = relatedItems(meeting, year);
      const { bills, petitions, questions, committeeSessions, committeePending } = related;

      let html = `<details class="meeting-accordion" id="meeting-${esc(meeting.id)}" data-meeting-id="${esc(meeting.id)}">
        <summary>
          <span>
            <span class="meeting-accordion__heading">
              <span class="chip">${esc(meeting.monthLabel)}</span>
              <span class="meeting-accordion__title">${esc(meeting.name)}</span>
            </span>
            <span class="meeting-accordion__summary">${esc(meeting.summary)}</span>
            ${meetingCountsHtml(meeting, related)}
          </span>
          <span class="meeting-accordion__icon" aria-hidden="true"></span>
        </summary>
        <div class="meeting-accordion__content"><section><div class="container">
        <h2>${esc(meeting.detailTitle || meeting.name)}</h2>
        <p class="section-lead">${esc(meeting.detailLead || meeting.summary)}</p>
        ${statsHtml(meeting.stats)}
        ${timelineHtml(meeting.events, site)}`;

      // 公開済み委員会の質疑・答弁と、会議録公開待ちの台帳
      if (committeeSessions.length > 0 || committeePending.length > 0) {
        const exchangeCount = committeeSessions.reduce((total, session) =>
          total + (session.topics || []).reduce((topicTotal, topic) => topicTotal + (topic.exchanges || []).length, 0), 0);
        html += recordSectionHtml({
          id: `committee-qa-${meeting.id}`,
          title: "委員会での質疑・答弁",
          lead: "公式会議録または校正原稿から、質問・確認・意見・要望と答弁・対応を議題別に整理しています。",
          countLabel: `${committeeSessions.length}会議・${exchangeCount}件${committeePending.length ? `／公開待ち等${committeePending.length}会議` : ""}`,
          content: committeeSessionsHtml(committeeSessions, committeePending),
          open: false
        });
      }

      // 注目議案（見出し付き／見出しなしのグリッド両対応）
      if (bills.length > 0) {
        const sec = meeting.billsSection || {};
        html += recordSectionHtml({
          id: `bills-${meeting.id}`,
          title: sec.title || "議案",
          lead: sec.lead || "公式の提出議案ページに掲載された議案を全件表示します。",
          countLabel: `${bills.length}件`,
          content: `<div class="card-grid">${bills.map((b) => billCardHtml(b, site)).join("")}</div>`,
          open: bills.length <= 6
        });
      }

      // 請願・陳情
      if (petitions.length > 0) {
        const sec = meeting.petitionsSection || {};
        html += recordSectionHtml({
          id: `petitions-${meeting.id}`,
          title: sec.title || "請願・陳情",
          lead: sec.lead || "公式の提出議案ページに掲載された請願・陳情を全件表示します。",
          countLabel: `${petitions.length}件`,
          content: `<div class="rows">${petitions.map((p) => petitionRowHtml(p, site)).join("")}</div>`,
          open: petitions.length <= 6
        });
      }

      // 代表質問・一般質問
      if (questions.length > 0) {
        const sec = meeting.questionsSection || {};
        const hasQaSummaries = questions.some((q) => (q.qaSummaries || []).length > 0);
        const links = sec.links && sec.links.length > 0 ? `<p>${pillsHtml(sec.links, site)}</p>` : "";
        html += recordSectionHtml({
          id: `questions-${meeting.id}`,
          title: sec.title || "代表質問・一般質問",
          lead: sec.lead || "公式の発言項目を省略せず掲載し、会議録から質問と答弁を要約しています。",
          countLabel: `${questions.length}名`,
          content: `${links}<div class="card-grid${hasQaSummaries ? " question-card-grid--summaries" : ""}">${questions.map((q) => questionCardHtml(q, site)).join("")}</div>`,
          open: questions.length <= 6
        });
      }

      html += `</div></section></div></details>`;
      return html;
    }

    // 会議録（議事録）コーナー
    function minutesSectionHtml(minutes, site) {
      const official = minutes.officialLists.map((o) => `
        <div class="row">
          <span class="key">${esc(o.category)}</span>
          <span>${esc(o.title)}</span>
          <a class="pill pill--minutes" href="${esc(o.url)}" target="_blank" rel="noopener">一覧を開く</a>
        </div>`).join("");

      const groups = minutes.draftGroups.map((g) => `
        <h3 class="group-title">${esc(g.title)}</h3>
        <div class="rows">${g.items.map((item) => `
          <div class="row">
            <span class="key">${esc(item.date)}</span>
            <span>${esc(item.meeting)}</span>
            <a class="pill pill--minutes" href="${esc(item.url)}" target="_blank" rel="noopener">PDFで読む</a>
          </div>`).join("")}</div>`).join("");

      return `<details class="meeting-accordion minutes-accordion" id="minutes">
        <summary>
          <span>
            <span class="meeting-accordion__heading">
              <span class="chip">資料</span>
              <span class="meeting-accordion__title">会議録（議事録）を読む</span>
            </span>
            <span class="meeting-accordion__summary">正式な会議録と、直近の校正原稿PDFをまとめて確認できます。</span>
          </span>
          <span class="meeting-accordion__icon" aria-hidden="true"></span>
        </summary>
        <div class="meeting-accordion__content"><section><div class="container">
        <h2>会議録（議事録）を読む</h2>
        <p class="section-lead">${esc(minutes.lead)}</p>
        <div class="notice">${esc(minutes.notice)}</div>
        <p>${(minutes.searchLinks || []).map(pillHtml).join("\n")}</p>
        <h3 class="group-title" id="minutes-official">${esc(minutes.officialTitle)}</h3>
        <p class="section-lead">${esc(minutes.officialLead)}</p>
        <div class="rows">${official}</div>
        ${groups}
        <p class="fine-print">${esc(minutes.asOfNote)}</p>
      </div></section></div></details>`;
    }

    // 現在表示中の折りたたみ要素
    function accordions() {
      return [...document.querySelectorAll("#detail-root .meeting-accordion")];
    }

    // 全開閉ボタンの状態と読み上げ用の件数を更新する
    function updateAccordionControls() {
      const items = accordions();
      const controls = document.getElementById("accordion-controls");
      controls.hidden = items.length === 0;
      if (items.length === 0) return;
      const openCount = items.filter((item) => item.open).length;
      document.getElementById("accordion-status").textContent = `${openCount} / ${items.length}件を表示中`;
      document.getElementById("open-all").disabled = openCount === items.length;
      document.getElementById("close-all").disabled = openCount === 0;
    }

    function setAllAccordions(open) {
      for (const item of accordions()) item.open = open;
      if (open) {
        for (const details of document.querySelectorAll("#detail-root .committee-session")) {
          renderCommitteeSession(details);
        }
      }
      for (const details of document.querySelectorAll("#detail-root .record-section, #detail-root .card.q, #detail-root .committee-session, #detail-root .committee-topic")) {
        details.open = open;
      }
      updateAccordionControls();
    }

    // details/summary の開閉状態を読み上げ可能にし、Enter・Space操作を明示的に保証する
    function setupDetailsAccessibility(root = document.getElementById("detail-root")) {
      for (const details of root.querySelectorAll("details")) {
        if (details.dataset.a11yReady === "true") continue;
        const summary = [...details.children].find((child) => child.tagName === "SUMMARY");
        if (!summary) continue;
        details.dataset.a11yReady = "true";
        summary.setAttribute("role", "button");
        summary.setAttribute("aria-expanded", String(details.open));
        details.addEventListener("toggle", () => {
          summary.setAttribute("aria-expanded", String(details.open));
          if (details.matches(".committee-session") && details.open) renderCommitteeSession(details);
        });
        summary.addEventListener("keydown", (event) => {
          if (event.key !== "Enter" && event.key !== " ") return;
          event.preventDefault();
          details.open = !details.open;
        });
      }
    }

    function decodedHashId() {
      try {
        return decodeURIComponent(location.hash.slice(1));
      } catch (err) {
        return "";
      }
    }

    function hashBelongsToYear(hashId, yearId) {
      return ["meeting", "question", "committee", "bills", "petitions"]
        .some((prefix) => hashId.startsWith(`${prefix}-${yearId}-`));
    }

    // アンカー先が閉じた会議・資料種別・質問者の内側にある場合は、祖先をすべて開く
    function openAccordionForHash(shouldScroll) {
      if (!location.hash) return false;
      const hashId = decodedHashId();
      let target = document.getElementById(hashId);
      if (!target && hashId.startsWith("committee-") && activeYear) {
        const session = (activeYear.committeeSessions || []).find((item) =>
          hashId === `committee-${item.id}` || hashId.startsWith(`committee-${item.id}-`));
        const details = session && document.getElementById(`committee-${session.id}`);
        if (details) {
          renderCommitteeSession(details);
          details.open = true;
          target = document.getElementById(hashId);
        }
      }
      if (!target) return false;
      if (target.matches("details")) target.open = true;
      let ancestor = target.parentElement && target.parentElement.closest("details");
      while (ancestor) {
        ancestor.open = true;
        ancestor = ancestor.parentElement && ancestor.parentElement.closest("details");
      }
      updateAccordionControls();
      if (shouldScroll) requestAnimationFrame(() => target.scrollIntoView({ block: "start" }));
      return true;
    }

    function setupAccordions() {
      setupDetailsAccessibility();
      for (const item of accordions()) item.addEventListener("toggle", updateAccordionControls);
      updateAccordionControls();
      openAccordionForHash(false);
    }

    // 参照元
    function renderSources(site) {
      const items = (site.sources || []).map((s) =>
        `<li><a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.label)}</a></li>`
      ).join("");
      document.getElementById("sources-root").innerHTML = `
        <h2>参照元</h2>
        <ul>${items}</ul>
        <p class="fine-print">${esc(site.sourcesNote)}</p>`;
    }

    // フッター（免責の再掲＋更新日）
    function renderFooter(site, year) {
      document.getElementById("footer-root").innerHTML =
        `${esc(site.siteName)} — ${esc(site.disclaimer)}<br />データ最終更新日: ${esc(year.updatedAt)}`;
    }

    // 年データ全体の描画（会議をすべて並べた後、会議録コーナーを必ず最後尾に置く）
    function renderYear(year, site) {
      activeYear = year;
      activeSite = site;
      renderHero(site);
      renderYearOverview(year, site);

      let html = `<div class="container accordion-list">`;
      for (const meeting of year.meetings || []) {
        if (hasMeetingDetails(meeting, year)) {
          html += meetingSectionHtml(meeting, year, site);
        }
      }
      if (year.minutes) html += minutesSectionHtml(year.minutes, site);
      html += `</div>`;

      document.getElementById("detail-root").innerHTML = html;
      setupAccordions();
      renderFooter(site, year);
    }

    /* ---------- 初期化 ---------- */

    // 読み込み失敗時の案内
    function showLoadError(err) {
      document.getElementById("detail-root").innerHTML = `
        <div class="load-error container">
          <strong>データを読み込めませんでした。</strong><br />
          ${esc(err.message)}<br /><br />
          <code>index.html</code> と同じ場所に <code>data</code> フォルダ（data/site.js、data/r08.js など）が
          あるか確認してください。フォルダごと移動・コピーすれば、そのまま動きます。
        </div>`;
    }

    async function init() {
      const db = window.SHINAGAWA_DB;
      if (!db || !db.site) {
        showLoadError(new Error("data/site.js が読み込まれていません"));
        return;
      }
      const site = db.site;
      renderSources(site);

      const sel = document.getElementById("year-select");

      document.getElementById("open-all").addEventListener("click", () => setAllAccordions(true));
      document.getElementById("close-all").addEventListener("click", () => setAllAccordions(false));

      // 指定された年のデータを読み込んで描画する
      async function showYear(yearId) {
        const meta = site.years.find((y) => y.id === yearId && y.available);
        if (!meta) return;
        try {
          const year = await loadYearData(meta);
          renderYearSelect(site, yearId);
          renderYear(year, site);
        } catch (err) {
          showLoadError(err);
        }
      }

      // 別の年の会議アンカーへ移動した場合は、年も切り替えてから対象を開く
      async function showHashTarget() {
        const hashId = decodedHashId();
        const hashYear = site.years.find((y) => hashBelongsToYear(hashId, y.id) && y.available);
        if (hashYear && sel.value !== hashYear.id) await showYear(hashYear.id);
        openAccordionForHash(true);
      }

      sel.addEventListener("change", () => showYear(sel.value));
      window.addEventListener("hashchange", showHashTarget);

      // 会議アンカーが指定されていれば、その会議が属する年を最初に表示する
      const hashId = decodedHashId();
      const hashYear = site.years.find((y) => hashBelongsToYear(hashId, y.id) && y.available);
      await showYear(hashYear ? hashYear.id : site.defaultYear);
      openAccordionForHash(true);
    }

    init();
  </script>
</body>
</html>
