<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1f4e79" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%231f4e79'/%3E%3Cpath d='M8 9h16v3H8zm0 6h16v3H8zm0 6h11v3H8z' fill='white'/%3E%3C/svg%3E" />
  <title>品川区ニュース | 品川区議会DB</title>
  <style>
    :root {
      --main: #1f4e79; --main-dark: #173a5e; --main-pale: #e7eef4;
      --bg: #f4f1e8; --card: #fffdf8; --ink: #17212b; --soft: #4f5d68;
      --border: #b9c3cc; --rule: #d8d2c4; --star: #a65f00;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      overflow-wrap: break-word;
    }
    a { color: var(--main-dark); font-weight: 700; text-underline-offset: 3px; }
    button, input, select { font: inherit; }
    .container { width: min(1080px, calc(100% - 32px)); margin: 0 auto; }
    .hero { border-top: 6px solid var(--main); border-bottom: 1px solid var(--rule); background: var(--card); padding: 36px 0 28px; }
    .back { display: inline-block; margin-bottom: 18px; font-size: 14px; }
    h1 { margin: 0 0 12px; color: var(--main-dark); font-size: clamp(32px, 6vw, 52px); line-height: 1.12; }
    .lead { max-width: 780px; margin: 0; color: var(--soft); line-height: 1.8; }
    .notice {
      margin-top: 20px; border: 1px solid var(--border); border-left: 4px solid var(--main);
      border-radius: 3px; background: #f8fafc; padding: 12px 14px; font-size: 13px; line-height: 1.7;
    }
    .controls-wrap { position: sticky; top: 0; z-index: 10; border-bottom: 1px solid var(--border); background: rgba(244, 241, 232, .97); box-shadow: 0 2px 6px rgba(23,33,43,.08); backdrop-filter: blur(8px); }
    .controls { display: grid; grid-template-columns: minmax(220px, 1fr) 190px auto; gap: 10px; padding: 12px 0; }
    .controls input, .controls select {
      width: 100%; min-height: 44px; border: 1px solid var(--border); border-radius: 3px;
      background: var(--card); padding: 8px 11px; color: var(--ink); font-size: 16px;
    }
    .view-switch { display: flex; gap: 6px; }
    .view-button {
      min-height: 44px; border: 1px solid var(--main); border-radius: 3px; background: var(--card);
      padding: 8px 12px; color: var(--main-dark); font-weight: 800; cursor: pointer; white-space: nowrap;
    }
    .view-button[aria-pressed="true"] { background: var(--main); color: #fff; }
    main { padding: 28px 0 56px; }
    .summary-row { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 10px; align-items: baseline; margin-bottom: 18px; }
    .summary-row h2 { margin: 0; font-size: 21px; }
    #result-status { color: var(--soft); font-size: 13px; font-weight: 700; }
    .news-list { display: grid; gap: 14px; }
    .news-card {
      display: grid; grid-template-columns: 1fr auto; gap: 12px 18px;
      border: 1px solid var(--border); border-radius: 4px; background: var(--card); padding: 18px;
    }
    .news-meta { display: flex; flex-wrap: wrap; gap: 6px 12px; align-items: center; margin-bottom: 8px; color: var(--soft); font-size: 12px; font-weight: 700; }
    .source { color: var(--main-dark); }
    .news-card h3 { margin: 0; font-size: 18px; line-height: 1.55; }
    .news-card p { margin: 10px 0 0; color: var(--soft); font-size: 14px; line-height: 1.8; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 13px; }
    .tag { border-radius: 3px; background: var(--main-pale); padding: 4px 8px; color: var(--main-dark); font-size: 11px; font-weight: 800; }
    .location { border: 1px solid var(--border); background: #f6f4ed; }
    .star-button {
      align-self: start; display: inline-grid; place-items: center; width: 44px; height: 44px;
      border: 1px solid var(--border); border-radius: 50%; background: var(--card); color: var(--soft);
      font-size: 23px; line-height: 1; cursor: pointer;
    }
    .star-button[aria-pressed="true"] { border-color: #d6a44b; background: #fff7d6; color: var(--star); }
    .star-button:focus-visible, .view-button:focus-visible, input:focus-visible, select:focus-visible, a:focus-visible { outline: 3px solid #f59e0b; outline-offset: 2px; }
    .empty { border: 1px dashed var(--border); border-radius: 4px; background: var(--card); padding: 42px 20px; text-align: center; color: var(--soft); line-height: 1.8; }
    .load-more { display: block; min-height: 44px; margin: 22px auto 0; border: 1px solid var(--main); border-radius: 3px; background: var(--card); padding: 9px 22px; color: var(--main-dark); font-weight: 800; cursor: pointer; }
    .load-more[hidden] { display: none; }
    .sources { margin-top: 42px; border-top: 1px solid var(--rule); padding-top: 28px; }
    .sources h2 { margin: 0 0 10px; font-size: 20px; }
    .sources p { margin: 0 0 14px; color: var(--soft); font-size: 13px; line-height: 1.7; }
    .source-list { columns: 2; margin: 0; padding-left: 20px; font-size: 13px; line-height: 1.9; }
    .source-list li { break-inside: avoid; }
    footer { border-top: 1px solid var(--rule); background: var(--card); padding: 24px 0; color: var(--soft); font-size: 12px; line-height: 1.7; }
    @media (max-width: 760px) {
      .container { width: min(100% - 22px, 1080px); }
      .controls { grid-template-columns: 1fr 1fr; }
      .controls input { grid-column: 1 / -1; }
      .view-switch { justify-content: stretch; }
      .view-button { flex: 1; padding-inline: 8px; }
      .news-card { padding: 15px; gap: 10px; }
      .news-card h3 { font-size: 16px; }
      .source-list { columns: 1; }
    }
  </style>
</head>
<body>
  <header class="hero">
    <div class="container">
      <a class="back" href="index.html">← 品川区議会DBに戻る</a>
      <h1>品川区ニュース</h1>
      <p class="lead">品川区に関係する行政、議会、地域、防災、交通などの情報を、複数の公開情報源から自動収集して整理します。</p>
      <div class="notice">記事の本文は各発信元に帰属します。このページにはタイトルと短い概要のみを掲載しています。内容・日時は、必ず「元の記事を読む」から発信元をご確認ください。</div>
    </div>
  </header>

  <div class="controls-wrap">
    <div class="container controls" aria-label="ニュースの絞り込み">
      <input id="search" type="search" placeholder="地名、駅名、ニュースの内容で検索" aria-label="ニュースを検索" />
      <select id="tag-filter" aria-label="タグで絞り込む"><option value="">すべてのタグ</option></select>
      <div class="view-switch" aria-label="表示の切り替え">
        <button class="view-button" id="all-button" type="button" aria-pressed="true">すべて</button>
        <button class="view-button" id="saved-button" type="button" aria-pressed="false">★ 保存済み</button>
      </div>
    </div>
  </div>

  <main class="container">
    <div class="summary-row">
      <h2 id="list-title">新着ニュース</h2>
      <div id="result-status" role="status" aria-live="polite"></div>
    </div>
    <div id="news-list" class="news-list"></div>
    <button id="load-more" class="load-more" type="button" hidden>さらに表示</button>

    <section class="sources" aria-labelledby="sources-title">
      <h2 id="sources-title">収集元</h2>
      <p>RSSのない公式サイトは、公開されている新着一覧を定期確認しています。東京都公式RSSは利用申請が必要なため、現在は収集していません。</p>
      <ul id="source-list" class="source-list"></ul>
    </section>
  </main>

  <footer><div class="container">品川区議会DB — ニュースの正確な内容は、必ず各発信元のページで確認してください。</div></footer>

  <script src="data/news-items.js"></script>
  <script>
    (() => {
      const data = window.SHINAGAWA_NEWS || { items: [], sources: [] };
      const storageKey = "shinagawa-news-favorites-v1";
      const state = { savedOnly: false, visible: 40, favorites: loadFavorites() };
      const elements = {
        search: document.getElementById("search"), tag: document.getElementById("tag-filter"),
        all: document.getElementById("all-button"), saved: document.getElementById("saved-button"),
        title: document.getElementById("list-title"), status: document.getElementById("result-status"),
        list: document.getElementById("news-list"), more: document.getElementById("load-more"),
        sources: document.getElementById("source-list")
      };

      function loadFavorites() {
        try { return new Set(JSON.parse(localStorage.getItem(storageKey) || "[]")); }
        catch (_) { return new Set(); }
      }
      function saveFavorites() {
        localStorage.setItem(storageKey, JSON.stringify([...state.favorites]));
      }
      function escapeHtml(value) {
        return String(value || "").replace(/[&<>'"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"})[c]);
      }
      function safeUrl(value) {
        try { const url = new URL(value); return ["http:", "https:"].includes(url.protocol) ? url.href : "#"; }
        catch (_) { return "#"; }
      }
      function displayDate(value) {
        if (!value) return "日時不明";
        const date = new Date(value);
        if (Number.isNaN(date.valueOf())) return "日時不明";
        return new Intl.DateTimeFormat("ja-JP", { year: "numeric", month: "numeric", day: "numeric" }).format(date);
      }
      function filteredItems() {
        const query = elements.search.value.trim().toLocaleLowerCase("ja");
        const tag = elements.tag.value;
        return data.items.filter(item => {
          if (state.savedOnly && !state.favorites.has(item.id)) return false;
          if (tag && !(item.tags || []).includes(tag)) return false;
          if (!query) return true;
          const text = [item.title, item.summary, item.source, ...(item.tags || []), ...(item.locations || [])].join(" ").toLocaleLowerCase("ja");
          return text.includes(query);
        });
      }
      function cardHtml(item) {
        const saved = state.favorites.has(item.id);
        const tags = (item.tags || []).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join("");
        const locations = (item.locations || []).map(term => `<span class="tag location">${escapeHtml(term)}</span>`).join("");
        return `<article class="news-card">
          <div>
            <div class="news-meta"><span class="source">${escapeHtml(item.source)}</span><time datetime="${escapeHtml(item.publishedAt)}">${item.dateKind === "collected" ? "取得 " : ""}${displayDate(item.publishedAt)}</time></div>
            <h3><a href="${safeUrl(item.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.title)}</a></h3>
            ${item.summary ? `<p>${escapeHtml(item.summary)}</p>` : ""}
            <div class="tags">${tags}${locations}</div>
          </div>
          <button class="star-button" type="button" data-id="${escapeHtml(item.id)}" aria-pressed="${saved}" aria-label="${saved ? "保存を解除" : "気になるニュースとして保存"}">${saved ? "★" : "☆"}</button>
        </article>`;
      }
      function render() {
        const items = filteredItems();
        const visible = items.slice(0, state.visible);
        elements.title.textContent = state.savedOnly ? "保存済みニュース" : "新着ニュース";
        elements.status.textContent = `${items.length.toLocaleString("ja-JP")}件`;
        elements.list.innerHTML = visible.length
          ? visible.map(cardHtml).join("")
          : `<div class="empty">${state.savedOnly ? "保存したニュースはまだありません。☆を押すと、この端末に保存できます。" : "条件に一致するニュースはありません。"}</div>`;
        elements.more.hidden = visible.length >= items.length;
        elements.all.setAttribute("aria-pressed", String(!state.savedOnly));
        elements.saved.setAttribute("aria-pressed", String(state.savedOnly));
      }
      function setSavedOnly(value) { state.savedOnly = value; state.visible = 40; render(); }

      const tags = [...new Set(data.items.flatMap(item => item.tags || []))].sort((a, b) => a.localeCompare(b, "ja"));
      elements.tag.insertAdjacentHTML("beforeend", tags.map(tag => `<option value="${escapeHtml(tag)}">${escapeHtml(tag)}</option>`).join(""));
      elements.sources.innerHTML = (data.sources || []).filter(source => source.enabled).map(source =>
        `<li><a href="${safeUrl(source.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(source.name)}</a>（${source.type === "rss" ? "RSS" : "公式サイト"}）</li>`
      ).join("") || "<li>収集処理の初回実行後に表示されます。</li>";

      elements.search.addEventListener("input", () => { state.visible = 40; render(); });
      elements.tag.addEventListener("change", () => { state.visible = 40; render(); });
      elements.all.addEventListener("click", () => setSavedOnly(false));
      elements.saved.addEventListener("click", () => setSavedOnly(true));
      elements.more.addEventListener("click", () => { state.visible += 40; render(); });
      elements.list.addEventListener("click", event => {
        const button = event.target.closest(".star-button");
        if (!button) return;
        const id = button.dataset.id;
        state.favorites.has(id) ? state.favorites.delete(id) : state.favorites.add(id);
        saveFavorites(); render();
      });
      render();
    })();
  </script>
</body>
</html>
