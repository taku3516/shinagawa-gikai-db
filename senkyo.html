<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1f4e79" />
  <title>品川区の選挙アーカイブ | 品川区議会DB</title>
  <link rel="stylesheet" href="site-nav.css" />
  <style>
    :root {
      --c-main: #1f4e79; --c-main-dark: #173a5e; --c-bg: #f4f1e8;
      --c-card: #fffdf8; --c-ink: #17212b; --c-ink-soft: #4f5d68;
      --c-border: #b9c3cc; --c-soft-blue: #e7eef4; --c-warn: #fef3c7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--c-bg); color: var(--c-ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    }
    a { color: var(--c-main-dark); font-weight: 700; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .container { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }
    .hero {
      padding: 40px 0 28px; border-top: 6px solid var(--c-main); border-bottom: 1px solid #d8d2c4;
      background: var(--c-card);
    }
    .breadcrumb { margin: 0 0 12px; font-size: 14px; }
    h1 { margin: 0 0 12px; font-size: clamp(28px, 5vw, 48px); line-height: 1.15; }
    .lead { max-width: 820px; margin: 0; font-size: 16px; line-height: 1.9; }
    .disclaimer {
      max-width: 900px; margin-top: 18px; padding: 14px 16px;
      border: 1px solid var(--c-border); border-left: 4px solid var(--c-main);
      border-radius: 3px; background: var(--c-card); font-size: 14px; line-height: 1.8;
    }
    main section { padding: 32px 0 48px; }
    .reference-panel {
      margin-top: 32px; padding: 20px;
      border: 1px solid var(--c-border); border-top: 4px solid var(--c-main);
      border-radius: 3px; background: var(--c-card);
    }
    .reference-panel h2 { margin: 0 0 6px; font-size: 20px; }
    .reference-panel > p { margin: 0; color: var(--c-ink-soft); font-size: 13px; line-height: 1.8; }
    .reference-list { display: grid; gap: 10px; margin: 16px 0 10px; padding: 0; list-style: none; }
    .reference-list a {
      display: flex; min-height: 44px; gap: 10px; align-items: center; justify-content: space-between;
      padding: 10px 12px; border: 1px solid var(--c-border); border-radius: 3px;
      background: #f8fafc;
    }
    .reference-list a:hover { background: var(--c-soft-blue); }
    .reference-role {
      flex: 0 0 auto; padding: 3px 8px; border-radius: 3px;
      background: var(--c-soft-blue); color: var(--c-main-dark); font-size: 12px;
    }
    .controls {
      display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
      margin-bottom: 18px;
    }
    .controls label { color: var(--c-ink-soft); font-size: 14px; font-weight: 800; }
    select, #candidate-search {
      min-height: 42px; border: 1px solid var(--c-border); border-radius: 3px;
      background: var(--c-card); padding: 8px 12px; color: var(--c-ink); font-size: 15px;
    }
    #candidate-search { width: min(100%, 240px); }
    #hit-count { color: var(--c-ink-soft); font-size: 13px; font-weight: 700; }
    .election-list { display: grid; gap: 16px; }
    .election-card {
      border: 1px solid var(--c-border); border-left: 4px solid var(--c-main);
      border-radius: 3px; background: var(--c-card);
    }
    .election-card details { padding: 0; }
    .election-card summary {
      cursor: pointer; padding: 18px 20px; color: var(--c-main-dark);
      font-weight: 800; line-height: 1.6;
    }
    .election-card summary:hover { background: #f8fafc; }
    .summary-main { display: inline-flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .date { color: var(--c-ink); font-variant-numeric: tabular-nums; }
    .tag {
      display: inline-flex; padding: 3px 9px; border-radius: 3px;
      background: var(--c-soft-blue); color: var(--c-main-dark); font-size: 12px;
    }
    .summary-meta { display: block; margin: 6px 0 0 20px; color: var(--c-ink-soft); font-size: 13px; }
    .election-body { padding: 0 20px 20px; border-top: 1px solid var(--c-border); }
    .election-body h3 { margin: 20px 0 10px; font-size: 17px; }
    .stats {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 8px; margin-top: 16px;
    }
    .stat { padding: 10px 12px; border: 1px solid var(--c-border); background: #fafafa; }
    .stat dt { color: var(--c-ink-soft); font-size: 12px; font-weight: 800; }
    .stat dd { margin: 4px 0 0; font-size: 16px; font-weight: 800; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--c-border); }
    table { width: 100%; min-width: 680px; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 9px 10px; border-bottom: 1px solid var(--c-border); text-align: left; }
    th { background: var(--c-soft-blue); white-space: nowrap; }
    td.number { text-align: right; font-variant-numeric: tabular-nums; }
    .pill {
      display: inline-flex; min-height: 36px; align-items: center; margin: 4px 6px 0 0;
      border: 1px solid var(--c-border); border-radius: 3px; padding: 6px 12px;
      background: var(--c-card); font-size: 13px;
    }
    .empty-state {
      padding: 30px; border: 1px dashed var(--c-border); border-radius: 3px;
      background: var(--c-card); line-height: 1.9;
    }
    .empty-state h2 { margin: 0 0 8px; font-size: 21px; }
    .empty-state p { margin: 0; color: var(--c-ink-soft); }
    .fine-print { margin-top: 22px; color: var(--c-ink-soft); font-size: 12px; line-height: 1.8; }
    .visually-hidden {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
    }
    footer {
      padding: 32px 0; border-top: 1px solid var(--c-border);
      background: var(--c-main-dark); color: #fff; text-align: center;
      font-size: 13px; line-height: 1.8;
    }
    @media (max-width: 640px) {
      .container { width: min(100% - 24px, 1120px); }
      .hero { padding-top: 28px; }
      .controls { align-items: stretch; }
      .controls label { width: 100%; margin-bottom: -8px; }
      select { width: 100%; }
      .reference-panel { padding: 16px; }
      .reference-list a { align-items: flex-start; flex-direction: column; }
      .summary-meta { margin-left: 0; }
      .election-card summary, .election-body { padding-left: 14px; padding-right: 14px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="hero">
      <div class="container">
        <p class="breadcrumb"><a href="index.html">← 品川区議会DB トップへ</a></p>
        <h1>品川区の選挙アーカイブ</h1>
        <p class="lead">品川区で行われた区議選、区長選、都議選、衆議院選を、新しいものから振り返るためのページです。</p>
        <div class="disclaimer">
          現在は画面とデータ形式、参考にするサイトのみ準備しています。選挙名、候補者、得票数、投票率などの個別情報はまだ掲載していません。
        </div>
        <nav data-site-nav></nav>
      </div>
    </div>

    <section>
      <div class="container">
        <div class="controls" aria-label="選挙の絞り込み">
          <label for="type-filter">選挙の種類</label>
          <select id="type-filter"><option value="">すべての選挙</option></select>
          <label for="year-filter">実施年</label>
          <select id="year-filter"><option value="">すべての年</option></select>
          <label for="candidate-search">候補者名</label>
          <input id="candidate-search" type="search" placeholder="人物名で検索" autocomplete="off" />
          <span id="hit-count" aria-live="polite"></span>
        </div>
        <div id="election-root" class="election-list"></div>
        <p class="fine-print" id="as-of-note"></p>
        <aside class="reference-panel" aria-labelledby="reference-title">
          <h2 id="reference-title">参考にするサイト</h2>
          <p>今後、個別の選挙情報を確認・追加するときに参照するサイトです。現時点では参照先のみを登録しています。</p>
          <div id="reference-sites"></div>
        </aside>
      </div>
    </section>
  </main>

  <footer><div class="container">品川区議会DB — 選挙結果は、掲載時に必ず一次情報へのリンクを併記します。</div></footer>

  <script src="data/site.js"></script>
  <script src="site-nav.js"></script>
  <script src="data/elections.js"></script>
  <script src="data/people.js"></script>
  <script>
    "use strict";

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]
      ));
    }

    function typeLabel(data, type) {
      return data.types.find((item) => item.id === type)?.label || type || "選挙";
    }

    function normalize(value) {
      return String(value || "").normalize("NFKC").toLocaleLowerCase("ja").replace(/[\s・･()（）]/g, "");
    }

    // 人物台帳から、その人物の全表記（正式名＋エイリアス）を正規化して返す。
    // 選挙アーカイブは同一人物が年ごとに別表記で載る（例: あべ祐美子＝阿部祐美子、
    // 西本たか子＝西本貴子）ため、名簿からの person リンクではこれで名寄せする。
    function personRecord(personId) {
      if (!personId) return null;
      const people = (window.SHINAGAWA_DB.peopleData && window.SHINAGAWA_DB.peopleData.people) || [];
      return people.find((p) => p.id === personId) || null;
    }

    function personVariants(person) {
      if (!person) return [];
      return [person.name, ...(person.aliases || [])].map(normalize).filter(Boolean);
    }

    // 候補者名が人物の別表記いずれかと一致するか（正規化済みの部分一致で表記の細部差を吸収）
    function nameMatchesVariants(name, variants) {
      const normalized = normalize(name);
      return variants.some((v) => v && (normalized.includes(v) || v.includes(normalized)));
    }

    function statHtml(label, value, suffix = "") {
      if (value === "" || value === null || value === undefined) return "";
      return `<div class="stat"><dt>${esc(label)}</dt><dd>${esc(value)}${esc(suffix)}</dd></div>`;
    }

    function sourceLinksHtml(sources) {
      if (!sources || !sources.length) return `<span class="tag">参考リンク準備中</span>`;
      return sources.map((source) =>
        `<a class="pill" href="${esc(source.url)}" target="_blank" rel="noopener">${esc(source.label)}</a>`
      ).join("");
    }

    function personHref(candidate) {
      if (!candidate.personUrl) return "";
      const separator = candidate.personUrl.includes("?") ? "&" : "?";
      return `${candidate.personUrl}${separator}q=${encodeURIComponent(candidate.name || "")}`;
    }

    function referenceSitesHtml(sites) {
      if (!sites || !sites.length) return `<p class="fine-print">参考にするサイトは準備中です。</p>`;
      return `<ul class="reference-list">${sites.map((site) => `<li><a href="${esc(site.url)}" target="_blank" rel="noopener">
        <span>${esc(site.label)}</span><span class="reference-role">${esc(site.role)}</span>
      </a></li>`).join("")}</ul><p class="fine-print">外部サイトが開きます。掲載内容を追加する際は、品川区公式サイトを一次情報として確認します。</p>`;
    }

    function candidatesHtml(election, matcher) {
      const candidates = (election.candidates || []).filter(candidate => !matcher || !matcher.active || matcher.test(candidate));
      if (!candidates.length) return `<p><span class="tag">候補者・得票情報準備中</span></p>`;
      return `<div class="table-wrap"><table>
        <caption class="visually-hidden">${esc(election.title)}の候補者別結果</caption>
        <thead><tr><th>順位</th><th>当落</th><th>候補者</th><th>党派</th><th>得票数</th><th>得票率</th></tr></thead>
        <tbody>${candidates.map((candidate) => `<tr>
          <td class="number">${esc(candidate.rank)}</td>
          <td>${esc(candidate.result)}</td>
          <td>${candidate.personUrl
            ? `<a href="${esc(personHref(candidate))}">${esc(candidate.name)}</a>`
            : esc(candidate.name)}</td>
          <td>${esc(candidate.party)}</td>
          <td class="number">${esc(candidate.votesDisplay)}</td>
          <td class="number">${esc(candidate.voteShare)}</td>
        </tr>`).join("")}</tbody>
      </table></div>`;
    }

    function proportionalResultsHtml(election) {
      const results = election.proportionalResults || [];
      if (!results.length) return "";
      return `<h3>比例代表の品川区得票</h3><div class="table-wrap"><table>
        <caption class="visually-hidden">${esc(election.title)}の比例代表結果</caption>
        <thead><tr><th>順位</th><th>政党等</th><th>得票数</th><th>得票率</th></tr></thead>
        <tbody>${results.map((result, index) => `<tr>
          <td class="number">${esc(result.rank ?? index + 1)}</td>
          <td>${esc(result.name)}</td>
          <td class="number">${esc(result.votesDisplay)}</td>
          <td class="number">${esc(result.voteShare)}</td>
        </tr>`).join("")}</tbody>
      </table></div>`;
    }

    function electionHtml(data, election, shouldOpen, matcher) {
      const meta = [
        election.turnout !== undefined ? `投票率 ${election.turnout}%` : "",
        election.candidateCount !== undefined ? `候補者 ${election.candidateCount}人` : "",
        election.seats !== undefined ? `定数 ${election.seats}` : ""
      ].filter(Boolean).join("・");
      return `<article class="election-card" id="election-${esc(election.id)}">
        <details${shouldOpen ? " open" : ""}>
          <summary>
            <span class="summary-main"><span class="date">${esc(election.electionDate)}</span><span>${esc(election.title)}</span><span class="tag">${esc(typeLabel(data, election.type))}</span>${election.subtype ? `<span class="tag">${esc(election.subtype)}</span>` : ""}</span>
            ${meta ? `<span class="summary-meta">${esc(meta)}</span>` : ""}
          </summary>
          <div class="election-body">
            ${election.summary ? `<p>${esc(election.summary)}</p>` : ""}
            <dl class="stats">
              ${statHtml("選挙区", election.district)}
              ${statHtml("告示日", election.noticeDate)}
              ${statHtml("当日有権者数", election.electorate, "人")}
              ${statHtml("投票者数", election.voters, "人")}
              ${statHtml("投票率", election.turnout, "%")}
              ${statHtml("前回投票率", election.previousTurnout, "%")}
            </dl>
            <h3>候補者別結果</h3>
            ${candidatesHtml(election, matcher)}
            ${proportionalResultsHtml(election)}
            <h3>公式資料・参考リンク</h3>
            <div>${sourceLinksHtml(election.sources)}</div>
            ${election.verifiedAt ? `<p class="fine-print">確認日: ${esc(election.verifiedAt)}</p>` : ""}
          </div>
        </details>
      </article>`;
    }

    function init() {
      const data = window.SHINAGAWA_DB && window.SHINAGAWA_DB.electionsData;
      const root = document.getElementById("election-root");
      if (!data) {
        root.innerHTML = `<div class="empty-state" role="alert"><h2>データを読み込めませんでした</h2><p>data/elections.js を確認してください。</p></div>`;
        return;
      }
      const typeSelect = document.getElementById("type-filter");
      const yearSelect = document.getElementById("year-filter");
      const candidateSearch = document.getElementById("candidate-search");
      const params = new URLSearchParams(location.search);
      document.getElementById("reference-sites").innerHTML = referenceSitesHtml(data.referenceSites);
      typeSelect.innerHTML = `<option value="">すべての選挙</option>` +
        data.types.map((item) => `<option value="${esc(item.id)}">${esc(item.label)}</option>`).join("");
      const years = [...new Set(data.elections.map((item) => String(item.electionDate || "").slice(0, 4)).filter(Boolean))].sort().reverse();
      yearSelect.innerHTML = `<option value="">すべての年</option>` +
        years.map((year) => `<option value="${esc(year)}">${esc(year)}年</option>`).join("");
      const personId = params.get("person") || "";
      const person = personRecord(personId);
      const personNameVariants = personVariants(person);
      // person リンク（名簿の「選挙アーカイブで探す」）なら、検索欄には人物の表示名を入れておく
      candidateSearch.value = params.get("q") || (person ? person.name : "");
      const personInitialQuery = candidateSearch.value.trim();

      // 照合条件を組み立てる。person リンクで検索欄がリンク初期値のままなら台帳の全表記で名寄せ照合。
      // ユーザーが検索欄を書き換えたら通常の文字列部分一致に切り替える。
      function buildMatcher() {
        const typed = candidateSearch.value.trim();
        if (personNameVariants.length && typed === personInitialQuery) {
          return { active: true, byPerson: true, test: (c) => nameMatchesVariants(c.name, personNameVariants) };
        }
        const query = normalize(typed);
        if (!query) return { active: false, byPerson: false, test: () => true };
        return { active: true, byPerson: false, test: (c) => normalize(c.name).includes(query) };
      }

      function render() {
        const type = typeSelect.value;
        const year = yearSelect.value;
        const matcher = buildMatcher();
        const list = data.elections
          .filter((item) => (!type || item.type === type) && (!year || String(item.electionDate).startsWith(year)))
          .filter((item) => !matcher.active || (item.candidates || []).some(matcher.test))
          .sort((a, b) => String(b.electionDate).localeCompare(String(a.electionDate)));
        root.innerHTML = list.length
          ? list.map((item) => electionHtml(data, item, matcher.active, matcher)).join("")
          : `<div class="empty-state" role="status"><h2>選挙情報は準備中です</h2><p>個別の選挙情報はまだ掲載していません。資料を確認後、新しい選挙から順に追加できる枠組みです。</p></div>`;
        document.getElementById("hit-count").textContent = `${list.length}件`;
        const nextParams = new URLSearchParams();
        if (candidateSearch.value.trim()) nextParams.set("q", candidateSearch.value.trim());
        if (matcher.byPerson && personId) nextParams.set("person", personId);
        const nextQuery = nextParams.toString();
        history.replaceState(null, "", `${location.pathname}${nextQuery ? `?${nextQuery}` : ""}${location.hash}`);
      }
      typeSelect.addEventListener("change", render);
      yearSelect.addEventListener("change", render);
      candidateSearch.addEventListener("input", render);
      document.getElementById("as-of-note").textContent = `${data.note}（更新日: ${data.updatedAt}）`;
      render();
    }

    init();
  </script>
</body>
</html>
