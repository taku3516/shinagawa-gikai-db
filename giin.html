<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1f4e79" />
  <title>議員名簿 | 品川区議会DB</title>
  <style>
    /* ===== index.html と同じ基調カラー ===== */
    :root {
      --c-main: #1f4e79;
      --c-main-dark: #173a5e;
      --c-bg: #f4f1e8;
      --c-card: #fffdf8;
      --c-ink: #17212b;
      --c-ink-soft: #4f5d68;
      --c-border: #b9c3cc;
      --c-video-bg: #fff1f2;
      --c-video-border: #fecaca;
      --c-video-text: #be123c;
      --c-minutes-bg: #f0fdf4;
      --c-minutes-border: #bbf7d0;
      --c-minutes-text: #15803d;
      --c-result-bg: #fef3c7;
      --c-result-text: #92400e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--c-bg);
      color: var(--c-ink);
    }

    a { color: var(--c-main-dark); font-weight: 700; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .container { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }

    .hero {
      padding: 40px 0 28px; border-top: 6px solid var(--c-main); border-bottom: 1px solid #d8d2c4;
      background: var(--c-card);
    }
    .breadcrumb { margin: 0 0 12px; font-size: 14px; }
    .hero h1 { margin: 0 0 12px; font-size: clamp(28px, 5vw, 48px); line-height: 1.1; }
    .hero .lead { max-width: 780px; margin: 0; font-size: 16px; line-height: 1.9; }
    .disclaimer {
      margin-top: 18px; max-width: 840px; padding: 14px 16px;
      border: 1px solid var(--c-border); border-left: 4px solid var(--c-main); border-radius: 3px;
      background: var(--c-card); font-size: 14px; line-height: 1.7;
    }

    section { padding: 32px 0 48px; }

    /* ===== 絞り込み ===== */
    .controls {
      display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
      margin: 0 0 8px;
    }
    .controls label { color: var(--c-ink-soft); font-size: 14px; font-weight: 800; }
    #search-box, #party-select {
      border: 1px solid var(--c-border); border-radius: 3px;
      background: var(--c-card); padding: 10px 12px;
      color: var(--c-ink); font-size: 15px;
    }
    #search-box { width: min(100%, 320px); }
    #party-select { font-weight: 800; }
    #hit-count { color: var(--c-ink-soft); font-size: 13px; font-weight: 700; }

    /* ===== 議員カード ===== */
    .member-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px; margin-top: 20px;
    }
    .member-card {
      border: 1px solid var(--c-border); border-left: 4px solid var(--c-main); border-radius: 3px;
      background: var(--c-card); padding: 20px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .member-card h2 { margin: 0; font-size: 20px; line-height: 1.4; }
    .member-card .kana { color: var(--c-ink-soft); font-size: 12px; font-weight: 700; }

    .tag {
      display: inline-flex; margin: 0 6px 4px 0; border-radius: 3px;
      background: #e7eef4; padding: 4px 10px;
      color: var(--c-main-dark); font-size: 12px; font-weight: 800;
    }
    .chip {
      display: inline-flex; margin: 0 6px 4px 0; border-radius: 3px;
      background: #f3f4f6; padding: 4px 10px; color: #374151;
      font-size: 12px; font-weight: 800;
    }

    .committee { margin: 0; color: var(--c-ink-soft); font-size: 13px; line-height: 1.7; }
    .committee strong { color: var(--c-ink); }

    .pill {
      display: inline-flex; align-items: center; margin: 4px 6px 0 0;
      border: 1px solid var(--c-border); border-radius: 3px;
      background: var(--c-card); padding: 6px 12px;
      color: var(--c-main-dark); font-size: 13px; font-weight: 800;
    }

    /* 後から情報を入れる枠（SNS・選挙履歴・政治資金収支報告書・政務活動費） */
    .extra-slot { font-size: 13px; line-height: 1.9; }
    .extra-slot .slot-name { color: var(--c-ink); font-weight: 800; }
    .pending {
      display: inline-flex; border-radius: 3px; background: #f3f4f6;
      padding: 2px 10px; color: #6b7280; font-size: 12px; font-weight: 700;
    }

    /* 詳細の開閉 */
    details { margin-top: 8px; border-top: 1px solid var(--c-border); padding-top: 10px; }
    summary {
      cursor: pointer; color: var(--c-main-dark); font-size: 13px; font-weight: 800;
      list-style-position: inside;
    }
    .detail-table { width: 100%; margin-top: 10px; border-collapse: collapse; font-size: 13px; }
    .detail-table th, .detail-table td {
      border: 1px solid var(--c-border); padding: 8px 10px;
      text-align: left; vertical-align: top; line-height: 1.7;
    }
    .detail-table th {
      width: 34%; background: #e7eef4;
      color: var(--c-ink); font-weight: 800; white-space: nowrap;
    }
    .detail-table td { color: var(--c-ink-soft); }

    .fine-print { margin: 24px 0 0; color: var(--c-ink-soft); font-size: 12px; line-height: 1.7; }

    footer {
      border-top: 1px solid var(--c-border);
      background: var(--c-main-dark);
      padding: 32px 0; text-align: center; font-size: 13px; line-height: 1.8; color: #fff;
    }

    .load-error {
      margin: 40px auto; max-width: 720px; padding: 20px;
      border: 1px solid var(--c-video-border); border-radius: 8px;
      background: var(--c-video-bg); font-size: 14px; line-height: 1.9;
    }

    @media (max-width: 640px) {
      .member-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <div class="hero">
      <div class="container">
        <p class="breadcrumb"><a href="index.html">← 品川区議会DB トップへ</a></p>
        <h1>議員名簿</h1>
        <p class="lead">
          品川区議会の議員紹介ページを基に、議員の情報を一覧できるようにしたページです。名前・会派・委員会で検索できます。過去の選挙・得票履歴は、出典確認後に追加できるよう項目を準備しています。
        </p>
        <div class="disclaimer">
          これは品川区が運営しているものではありません。掲載情報は品川区議会公式サイトからの転記です。最新かつ正確な情報は必ず<a href="https://gikai.city.shinagawa.tokyo.jp/profile/50on" target="_blank" rel="noopener">公式の議員紹介ページ</a>を確認してください。
        </div>
      </div>
    </div>

    <section>
      <div class="container">
        <div class="controls">
          <label for="search-box">検索</label>
          <input id="search-box" type="search" placeholder="名前・ふりがな・委員会など" />
          <label for="party-select">会派</label>
          <select id="party-select"><option value="">すべて</option></select>
          <span id="hit-count"></span>
        </div>
        <div id="member-root" class="member-grid"></div>
        <p class="fine-print" id="as-of-note"></p>
      </div>
    </section>
  </main>

  <footer>
    <div class="container" id="footer-root"></div>
  </footer>

  <!-- データ読み込み（script形式なので file:// のダブルクリックでも動く） -->
  <script src="data/members.js"></script>

  <script>
    "use strict";

    /* ---------- ユーティリティ ---------- */

    // HTMLエスケープ（データ由来の文字列は必ずこれを通す）
    function esc(s) {
      return String(s ?? "").replace(/[&<>"']/g, (c) => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
      ));
    }

    // 改行を <br> にして表示する（履歴など複数行の項目用）
    function multiline(s) {
      return esc(s).replace(/\n/g, "<br />");
    }

    // 会派名から役職を除いた部分（絞り込み用）
    function partyName(member) {
      return (member.party || "").replace(/（.*$/, "");
    }

    /* ---------- カードの描画 ---------- */

    // 後から情報を入れる枠。データが空のうちは「準備中」を表示する
    function extraSlotHtml(slotName, items) {
      const body = (items && items.length > 0)
        ? items.map((it) =>
            `<a class="pill" href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.label)}</a>`
          ).join("")
        : `<span class="pending">準備中</span>`;
      return `<div class="extra-slot"><span class="slot-name">${esc(slotName)}:</span> ${body}</div>`;
    }

    // 詳細テーブルの1行（値が空の項目は行ごと省略する）
    function detailRow(label, value, isMultiline) {
      if (!value) return "";
      return `<tr><th>${esc(label)}</th><td>${isMultiline ? multiline(value) : esc(value)}</td></tr>`;
    }

    function memberCardHtml(m) {
      // 外部リンク（公式プロフィール・議員HP・メール）
      let links = `<a class="pill" href="${esc(m.profileUrl)}" target="_blank" rel="noopener">公式プロフィール</a>`;
      if (m.websiteUrl) links += `<a class="pill" href="${esc(m.websiteUrl)}" target="_blank" rel="noopener">議員ホームページ</a>`;
      if (m.email) links += `<a class="pill" href="mailto:${esc(m.email)}">メール</a>`;

      const committees = [];
      if (m.standingCommittee) committees.push(`<strong>常任:</strong> ${esc(m.standingCommittee)}`);
      if (m.specialCommittee) committees.push(`<strong>特別:</strong> ${multiline(m.specialCommittee)}`);

      return `
        <article class="member-card" data-party="${esc(partyName(m))}">
          <div>
            <h2>${esc(m.name)}</h2>
            <span class="kana">${esc(m.kana)}</span>
          </div>
          <div>
            <span class="tag">${esc(m.party)}</span>
            ${m.elections ? `<span class="chip">当選${esc(m.elections)}</span>` : ""}
          </div>
          ${committees.length ? `<p class="committee">${committees.join("<br />")}</p>` : ""}
          <div>${links}</div>
          ${extraSlotHtml("SNS", m.sns)}
          ${extraSlotHtml("過去の選挙・得票履歴", m.electionHistory)}
          ${extraSlotHtml("政治資金収支報告書", m.fundReports)}
          ${extraSlotHtml("政務活動費", m.activityExpenses)}
          <details>
            <summary>詳しい情報を見る</summary>
            <table class="detail-table">
              ${detailRow("生年月日", m.birth)}
              ${detailRow("住所または事務所の所在地", m.address)}
              ${detailRow("出身地", m.birthplace)}
              ${detailRow("電話番号", m.tel)}
              ${detailRow("ファクス番号", m.fax)}
              ${detailRow("附属機関委員等", m.affiliated, true)}
              ${detailRow("職業", m.occupation, true)}
              ${detailRow("主な履歴", m.career, true)}
              ${detailRow("趣味", m.hobby, true)}
            </table>
          </details>
        </article>`;
    }

    /* ---------- 絞り込み ---------- */

    function applyFilter(members) {
      const q = document.getElementById("search-box").value.trim().toLowerCase();
      const party = document.getElementById("party-select").value;
      return members.filter((m) => {
        if (party && partyName(m) !== party) return false;
        if (!q) return true;
        const haystack = [m.name, m.kana, m.party, m.standingCommittee, m.specialCommittee, m.occupation]
          .join(" ").toLowerCase();
        return haystack.includes(q);
      });
    }

    /* ---------- 初期化 ---------- */

    function init() {
      const db = window.SHINAGAWA_DB;
      if (!db || !db.membersData) {
        document.getElementById("member-root").innerHTML = `
          <div class="load-error">
            <strong>データを読み込めませんでした。</strong><br />
            <code>giin.html</code> と同じ場所に <code>data/members.js</code> があるか確認してください。
          </div>`;
        return;
      }
      const data = db.membersData;
      const members = data.members;

      // 会派の選択肢をデータから自動生成（掲載順を保ちつつ重複排除）
      const parties = [...new Set(members.map(partyName))];
      const sel = document.getElementById("party-select");
      sel.innerHTML = `<option value="">すべての会派</option>` +
        parties.map((p) => `<option value="${esc(p)}">${esc(p)}</option>`).join("");

      function render() {
        const list = applyFilter(members);
        document.getElementById("member-root").innerHTML = list.map(memberCardHtml).join("");
        document.getElementById("hit-count").textContent = `${list.length}名 / 全${members.length}名`;
      }

      document.getElementById("search-box").addEventListener("input", render);
      sel.addEventListener("change", render);

      document.getElementById("as-of-note").textContent = `${data.note}（データ取得日: ${data.updatedAt}）`;
      document.getElementById("footer-root").textContent =
        "品川区議会DB — これは品川区が運営しているものではありません。正確な情報は品川区議会公式サイトを確認してください。";

      render();
    }

    init();
  </script>
</body>
</html>
